 not dull their consciousness or ability to communicate. Control pain when it is m"}, {"src": "BScN Paper I", "sec": "SECTION 3: GENITOURINARY SYSTEM AND THE INTEGUMENTS Introduc", "txt": "he amount of fluid requirements in adults. Example of fluids to be administered: Crystalloids such as Ringer's lactate Give 2ml/Kg/%burn; one half in the first 8 hours post-burns and the other during the next 16 hours. Glucose in water Give in amounts to replace losses in the second 24 hours following burns. The mainstay of burn management is in three phases. Phase 1 (Emergrncy phase) \u2022 Fluid therapy, IV access, fluids given, and monitoring intake and output Wound care - topical antibiotics, deb"}, {"src": "BScN Paper I", "sec": "A GUIDE FOR BACHELOR OF SCIENCE (NURSING) LICENSING EXAMINAT", "txt": "e. 6. Chest X-ray: Shows opacity. 7. Clinical Diagnosis: Pulmonary tuberculosis. Integrated Management of Adolescent and Adult Illness [IMAI] IMAI is a health care strategy that addresses the overall health care of the patient. It focuses on the main clinical conditions that account for most of the deaths among adolescents and adults. It integrates the prevention of illnesses and care into a single health care package. If you use this approach, you will find it more rewarding and it will make yo"}, {"src": "BScN Paper II", "sec": "General", "txt": "given. Syntocinon 40 to 60 units in half litre of 5% dextrose is given by pump. faeces to avoid hookworm infestation. Encourage the practice of child spacing to avoid frequent pregnancies so as to give the woman's body time to replenish her body stores. In addition encourage her to continue coming to antenatal clinic. Prophylactic Medication Give the following supplements to the women throughout pregnancy: \u2022 Ferrous sulphate 200mg three times a day \u2022 Folic acid 5mg daily \u2022 Prophylactic anti mala"}, {"src": "BScN Paper I", "sec": "SECTION 4: SPECIAL PROCEDURES AND INVESTIGATIONS Introductio", "txt": "l clear the urea at the rate of 26ml/minute during acute phase of renal failure. As a nurse, during PD, you must ensure that the dialysate is at the body temparature (37 degrees Celsius) before introduction. This ensures the patient's comfort and provides vasodilation of blood vessels hence increasing solute transport in the peritoneum. The fluid should not be left in the peritoneal cavity longer than required and the amount introduced must be measured so as to compare with the amount drained du"}, {"src": "BScN Paper I", "sec": "A GUIDE FOR BACHELOR OF SCIENCE (NURSING) LICENSING EXAMINAT", "txt": "uld be kept locked and keys kept in the pocket of the one administering drugs. \u2022 Finally, record, interpret and report findings. Monitoring Intravenous Fluids Intravenous fluids are those solutions instilled within the patient\u2019s vein. They may include solutions of water and chemicals normally found within the body, dissolved medications or blood, blood extracts and blood substitutes. You will be expected at times to administer and regulate intravenous fluids. You will also be assigned to care fo"}, {"src": "BScN Paper IV", "sec": "General", "txt": "ature. \u2022 They have a high rate of driving offences when they attain adolescence. Treatments and Outcomes Cerebral stimulants like amphetamines have a quieting effect on children (Pelham, et al cited by Carson 2000). They decrease over activity and distractibility. At the same time, they increase their attention and their ability to concentrate. This enables them to function better at school. Though it does not cure hyperactivity, it is able to reduce behavioural symptoms in about two thirds of t"}, {"src": "BScN Paper II", "sec": "General", "txt": "nal at all. The canal becomes part of the uterine cavity with only the undilated The Stages of Labour Labour is divided into four stages, although in real practice, the process is a continuous one and change from one stage to the other may not be clearly obvious. The four stages of labour are known as First stage, Second stage, Third stage and Fourth stage. Each stage will now be covered in detail. In a primigravida the cervix usually becomes almost fully effaced before any dilation takes place,"}, {"src": "BScN Paper I", "sec": "A GUIDE FOR BACHELOR OF SCIENCE (NURSING) LICENSING EXAMINAT", "txt": "accross the bone. A spiral fracture is where the break coils around the bone. . near as normal anatomical position as possible. Methods used are: \u2022 Open reduction. This is a surgical method of bringing the fractured parts together. \u2022 Closed reduction. Here manipulation is used without viewing the fractures. An x-ray must be taken immediately after. b)Immobilisation A pathologic fracture occurs when the break is at the site of bone disease The aim is to prevent movement of injured parts already r"}, {"src": "BScN Paper I", "sec": "SECTION 3: GENITOURINARY SYSTEM AND THE INTEGUMENTS Introduc", "txt": "onic glomerulonephritis presents with oliguria, proteinuria, haematuria, oedema, and hypertension. This disease represents the last stage and may signal the onset of renal failure. Renal Failure Renal failure describes the inability of the kidneys to remove metabolic waste products and regulate fluids, electrolytes and the pH. It may be acute or chronic. Renal failure is caused by many factors, which can be divided into prerenal, intra-renal and post-renal causes. Acute Renal Failure Is a clinic"}, {"src": "BScN Paper II", "sec": "General", "txt": "ecord every two to four hours temperature, pulse, respiration and blood pressure Contractions should be recorded every 15 to 30 minutes and take care of the bladder every two hours Foetal Condition in Prolonged Labour The following steps should be taken to monitor the foetal condition: \u2022 Monitor the foetal heart continuously every quarter to half hour. \u2022 Observe the amniotic fluid for presence of meconium to rule out foetal distress. \u2022 For secondary hypotonic uterine contraction, commence an int"}, {"src": "BScN Paper II", "sec": "General", "txt": "ns, which is not common in our community but occurs sometimes Intrauterine death Foetal Maturity and Viability Where possible amniocentesis may be performed. The lecithin to sphingomyelin ratio in the liquor is calculated in order to estimate the foetal pulmonary maturity. When the ratio is less than two to one, it means that the lungs are not yet mature and induction of labour should be delayed. At times, steroids are given to the mother to stimulate the foetal lungs to produce surfactant to re"}, {"src": "BScN Paper I", "sec": "A GUIDE FOR BACHELOR OF SCIENCE (NURSING) LICENSING EXAMINAT", "txt": "fusion in the opposite arm or head 9. Apply warm compresses as described earlier Infection of the site may occur and could spread to other parts of the body through the blood stream. Evidence of infection includes: \u2022 The site may appear red and puffy \u2022 Purulent discharge may be present \u2022 The patient may have a rise in temperature and/or chills In the event of possible infection: \u2022 Discontinue the infusion and notify the doctor \u2022 Apply aseptic technique when dressing the wound \u2022 Take pus swab for"}, {"src": "BScN Paper II", "sec": "General", "txt": "tant \u2022 In case of episiotomy or a tear, scrub your hands while your assistant is setting a sterile suturing pack and repair the tear Ask the mother to lie on her back with her legs crossed on each other Ask the assistant to hand over the baby to the mother Leave the mother to rest while you go to examine the placenta Procedure Write down any reasons you can think of, for examining the placenta. You now know why we examine the placenta. But how do you go about it? The Fourth Stage of Labour The f"}, {"src": "BScN Paper II", "sec": "General", "txt": "the mother, such as syphilis, tuberculosis, chronic nephritis, cardiac disease, diabetes and thyroid disease, may lead to premature labour \u2022 Acute infections in the mother, like pneumonia, influenza, rheumatic fever and malaria could induce premature labour \u2022 Physical stress caused by non obstetric surgery may lead to premature labour if the mother has this procedure while pregnant \u2022 Congenital malformation of the foetus \u2022 Habitual abortion owing to incompetent cervical OS or uterine malformatio"}, {"src": "BScN Paper I", "sec": "SECTION 7: DISEASES OF THE NERVOUS AND ENDROCINE SYSTEMS Int", "txt": "ensive Care Unit Neonates requiring critical care are admitted and managed here. High Dependant Unit These function as a step down to ICU. Patients are nursed in these units after discharge from ICU before getting to the general wards. Burns Unit You have looked at an intensive care unit in general but it is important to note that many hospitals do not have separate units for the different types of critical care given. In most cases, they are all carried out in the intensive care unit. However, "}, {"src": "BScN Paper I", "sec": "A GUIDE FOR BACHELOR OF SCIENCE (NURSING) LICENSING EXAMINAT", "txt": "e muscles, which will injure tissues and often put unnecessary strain on joints. Avoid causing friction on the patient\u2019s skin. Roll or push the patient when possible rather than pull them across bed linens. Friction can be reduced by sprinkling powder or cornstarch on the patient\u2019s skin and linens. Use smooth rather than jerky movements when transferring the patient. Jerky motion tends to put extra strain on muscles and joints and is uncomfortable for the patient. Be realistic about how much you"}, {"src": "BScN Paper I", "sec": "SECTION 3: GENITOURINARY SYSTEM AND THE INTEGUMENTS Introduc", "txt": "es normally excreted in the urine. The stones can be made of calcium, magnesium, ammonium phosphate, uric acid or cystein compounds. Contributing factors to formation of stones are hypercalcaemia, immobilisation, hyperthyroidism, urinary tract infections, gout, cytotoxic therapy, and a diet that is rich in purines. Pain is the major symptom of the stones. They can also cause other symptoms related to obstruction. People who get severe dehydration are at risk of stone formation if they are predis"}, {"src": "BScN Paper I", "sec": "A GUIDE FOR BACHELOR OF SCIENCE (NURSING) LICENSING EXAMINAT", "txt": "requires special attention in order to maintain a safe and pleasant environment. This is important in order to: \u2022 Minimise the spread of infections and reduce the risk of accidental injury to staff, patients, visitors and the local community \u2022 Help provide an aesthetically pleasing atmosphere \u2022 Reduce odours \u2022 Reduce the chances of attracting insects and animals \u2022 Reduce the likelihood of contaminating the soil or ground water with chemicals or micro-organi Anyone who handles medical or hazardou"}, {"src": "BScN Paper II", "sec": "General", "txt": "the blood sugar level, signs and symptoms of hypo/hyperglycaemia and what to do. Management of the Diabetic Case During Labour After the good care prenatally you still have to maintain observation during labour and delivery. The mothers who are at risk, for instance those with a bad obstetric history, the elderly primigravidae, the mother with pre-eclampsia and a baby that is too big, should not deliver vaginally. At 36 to 38 weeks the mother is admitted for elective Caesarean section. On the da"}, {"src": "BScN Paper IV", "sec": "SECTION 1: CONCEPTS AND CONTRIBUTION OF RESEARCH Introductio", "txt": "y cheaper. They are initiated where results are required as a matter of urgency. Quasi-experimental Research This is a type of quantitative research whose purpose is to examine causal relationships or to determine the effects of one variable on another (Burns & Grove, 1999). Quasi-experimental studies involve implementing a specific treatment and then later examining the effects of this treatment using selected methods of measurement. Quasi-experimental study is a type of intervention study. SEC"}, {"src": "BScN Paper I", "sec": "A GUIDE FOR BACHELOR OF SCIENCE (NURSING) LICENSING EXAMINAT", "txt": "and may render the use of the involved limb difficult. This could be a result of neurological disease and can lead to lower back pain, and muscle pull. Care of Adults with Muscle and Ligament Disorders You have learnt about several soft tissue injuries, including sprains, strains, dislocations and subluxation. These are abnormalities affecting the articular points. The main goals of management of sprains and strains are to return the limb to normal function and to ensure satisfactory pain relief"}, {"src": "BScN Paper I", "sec": "SECTION 3: GENITOURINARY SYSTEM AND THE INTEGUMENTS Introduc", "txt": "ection (temperature, obvious pus around the burn area). Burns Percentage Diagram Diagnostic Investigations \u2022 The single most important laboratory test is the haemoglobin level (or haematocrit Management First Aid in the Home If anyone gets a scald from a hot liquid or a burn from a hot object in the home the resulting damage can be minimised if the skin is cooled immediately by dipping in clean, cold water. If this is done a few seconds after the accident, it may be possible to prevent a deep bu"}, {"src": "BScN Paper I", "sec": "SECTION 3: MANAGEMENT OF CRITICALLY ILL PATIENTS Introductio", "txt": ". In conclusion, the choice of management measures will be guided by ensuring an accurate diagnosis of the extent of body damage. After this, corrective and life sustaining measures are to be taken to allow the body time to recover. Acute, Chronic and End Stage Renal Failure Acute renal failure describes an abrupt and almost complete cessation of renal function. Chronic renal failure, on the other hand, describes an irreversible reduction in renal functions of a progressive nature. While acute r"}, {"src": "BScN Paper I", "sec": "A GUIDE FOR BACHELOR OF SCIENCE (NURSING) LICENSING EXAMINAT", "txt": "ion and teach the patient to avoid rapid postural changes. Moderate exercises to improve muscle tone which reduces stooping and shuffling movements. Patient should be instructed to walk slowly and carefully. Provide adequate rest to prevent fatigue. General nursing care includes assisting the patient to feed slowly, prevent constipation and provide psychological support to counteract depression, discouragement and hopelessness. Speech therapy should be done to correct dysarthia. Involve patient "}, {"src": "BScN Paper II", "sec": "General", "txt": "r has no obvious complaints. There moderate or severe. are three cardinal signs. Mild Pre-eclampsia This is detected when, after resting, the diastolic pressure is 15 to 20mm/hg above the basal blood pressure recorded in early pregnancy or a diastolic above 80 to 90mm/hg, for example, BP 130/80 to 140/90. Oedema of feet, ankles and pretibial region may also be present. Moderate Pre-eclampsia This is diagnosed when there is marked rise in both systolic and diastolic pressure - 140/100 to 160/100m"}, {"src": "BScN Paper I", "sec": "A GUIDE FOR BACHELOR OF SCIENCE (NURSING) LICENSING EXAMINAT", "txt": "includes protozoa (such as those that cause malaria), helminths and arthropods. The helminths are mobile parasites, while arthropods are vectors of diseases, for example, ticks. Others are ecto--parasites, for example, lice and mites that cause scabies. Ecto-parasites live on the outer body surface of their host. Malaria You will now look at a parasitic disease that presents a great challenge to health care services in our country. This is malaria. Malaria is a parasite disease caused by Plasmod"}, {"src": "BScN Paper II", "sec": "General", "txt": "of contractions in ten minutes \u2022 Fluid balance \u2022 Urinalysis \u2022 Drugs administered When observing the contractions, you should note the following: \u2022 Uterine contraction duration, strength and frequency \u2022 In early labour the contractions are mild, lasting 20 to 30 seconds and are infrequent \u2022 As labour progresses, the contractions become stronger, lasting 40 to 50 seconds and are about three contractions per ten minutes \u2022 The uterus should always relax between contractions \u2022 The cervix dilates prog"}, {"src": "BScN Paper I", "sec": "SECTION 3: GENITOURINARY SYSTEM AND THE INTEGUMENTS Introduc", "txt": "ry secretions is carried out from time to time in addition to postural drainage. Management You should begin to give health education as early as the patient\u2019s condition improves, instead of waiting until the last minute. This gives the patient and their family time to absorb and understand the information and consider any questions they might have. Environmental Control The house and home environment should be kept clean and free from dust. The child needs to be supervised so that they do not g"}, {"src": "BScN Paper II", "sec": "General", "txt": "ymptomatic bacteriuria. However, it causes more concern because of its symptoms. As stated earlier, urinary tract infection occurs more frequently in pregnancy. This is because: \u2022 The pregnant uterus causes pressure on the ureters and the bladder which delays emptying. \u2022 The action of hormones on the smooth muscles of the ureters and bladder also causes them to relax and dilate easily. This causes urine to move more slowly down the dilated tubes and infection lodges in them easily. \u2022 Normally th"}, {"src": "BScN Paper IV", "sec": "General", "txt": "nage them. \u2022 Discuss strategies of avoiding or coping with high risk situations. Make specific plans to avoid drug use, for example, how to respond to friends who still use drugs. \u2022 Identify family or friends who will support stopping drug use. \u2022 Consider options for counselling and/or rehabilitation. In the case of patients who do not succeed or relapse: \u2022 Identify and give credit for any success. \u2022 Discuss situations that led to the relapse. \u2022 Return to earlier steps. The medication to be used"}, {"src": "BScN Paper II", "sec": "SECTION 5: OBSTETRIC ANAESTHESIA, OPERATIONS AND EMERGENCIES", "txt": "reoccurs regularly from puberty to menopause, except when pregnancy intervenes. Proliferative Phase The proliferative phase follows menstruation and lasts up to ovulation. This phase is under the influence of oestrogen. There is growth and thickening of the endometrium in readiness to receive the fertilised ovum. Secretory Phase This is the last stage and follows ovulation. It is also known as the luteal phase. It occurs under the influence of the progesterone hormone and oestrogen from corpus l"}, {"src": "BScN Paper I", "sec": "A GUIDE FOR BACHELOR OF SCIENCE (NURSING) LICENSING EXAMINAT", "txt": "er to manage this patient for the potential of development of diabetes mellitus. PART TWO: ADULT NURSING Part two will start with the respiratory system and will highlight topics that have not been covered in part one. The nursing process from the previous units has been used, as this should be applied in patient care. Adult nursing involves the provision of care to all individuals aged above twelve years of age. It forms the core of general nursing practice. As a nurse, you must have cared for "}, {"src": "BScN Paper I", "sec": "A GUIDE FOR BACHELOR OF SCIENCE (NURSING) LICENSING EXAMINAT", "txt": "ications and the appropriate times for administering them. Medication Procedures The Right Client You should make sure that the right client receives the right drug. You should only give drugs to the person for whom they are prescribed or recommended for. If the patient is wearing an identification bracelet, check the client's name on their identification bracelet with the name on the medication card in your hand. Alternatively, if the patient is conscious and sane, simply call out the patient's"}, {"src": "BScN Paper II", "sec": "General", "txt": "management of the baby You will now go through these principles in more detail. Maintenance of the Established Respiration A normal baby should continue to breathe and maintain a good skin colour without medical intervention. A baby who tends to produce a lot of mucus should be closely watched and the airway cleared frequently, because this may tend to interfere with breathing by blocking the airway. The head of the cot should also be lowered in such circumstances. Measures should be taken to av"}, {"src": "BScN Paper II", "sec": "General", "txt": "there is any suspicion of disproportion, a caesarean section will be necessary. Chin has been delivered Once the chin has been delivered allow the occiput to sweep the perineum. In this way the submento-vertical diameter (11.5cm) distends the vaginal orifice, instead of the mento vertical diameter (13.5cm). There are several possible complications during labour with a face presentation. Obstructed Labour A minor degree of contracted pelvis may result in obstructed labour as facial bones do not m"}, {"src": "BScN Paper I", "sec": "SECTION 1: RESPIRATORY SYSTEM The Structures and Respiratory", "txt": "nection from ventilator or blockage Prevention of the over-inflation of the cuff Tracheotomy Tracheotomy is an incision into the trachea for the purpose of establishing an airway. Tracheostomy is the surgical creation of an opening into the trachea through the neck. It is used: \u2022 To bypass airway obstruction \u2022 To facilitate removal of secretions \u2022 To facilitate weaning from a ventilator \u2022 To permit long-term mechanical ventilation and improve patient comfort Care of the patient with tracheostomy"}, {"src": "BScN Paper I", "sec": "SECTION 7: DISEASES OF THE NERVOUS AND ENDROCINE SYSTEMS Int", "txt": "with only minor colonic jerks. The facial expression during an attack is blank. Change into lateral position to facilitate drainage of respiratory secretions from the mouth. Observe skin, eye and mouth colour. Take and record vital signs to monitor tachycardia and hypertension. Observe the degree of consciousness and mental status, the length of sleep, response to sensory stimulation. Any sensory impairment such as vision and hearing should be reported. Medical treatment involves the administrat"}, {"src": "BScN Paper I", "sec": "A GUIDE FOR BACHELOR OF SCIENCE (NURSING) LICENSING EXAMINAT", "txt": "-npropy) \u2022 phenothiazine hydrochloride \u2022 4-hydroxyacetanilide-p-acetami dopherol Efficacy is the effectiveness of a drug in treatment. Safety or Toxicity Safety or toxicity is measured by the incidence Examples of Names Common Drugs Generic Chemical Name Name Acetylsalicylic Ecotrin ASA acid Milk of Phillips Magnesium Magnesi milk of MOM hydroxide um Magnesia Hydrochloride of 4(dimethylamin o1,4a,5,5a,6,11 ,12aTetracycl octahydroine 3,6,10,12,12apentahydroxy6-mythyl-1,11dioxa-2napthacene carboxa"}, {"src": "BScN Paper II", "sec": "General", "txt": "ometrine should be given \u2022 The cord should be delivered controlled cord traction During the puerperium, the following measures should be taken: \u2022 The patient may need to rest and may require sedatives \u2022 Keep her under strict observation half hourly until stable then two to four hourly \u2022 Treat any infections promptly \u2022 If there are no complications, discharge on the tenth day post delivery Management of Heart Disease (Grade III and IV) When managing a patient with severe cardiac disease, the foll"}, {"src": "BScN Paper II", "sec": "SECTION 5: OBSTETRIC ANAESTHESIA, OPERATIONS AND EMERGENCIES", "txt": "patient's history to determine if the products of conception have been expelled. Threatened Slight placental slight bleeding, os closed. Here are some essential measures to take: \u2022 Reassure the patient that, if she continues with the pregnancy, the foetus will not be at greater risk of abnormalities and that it will continue to grow just like in a normal pregnancy. \u2022 Ensure bed rest and allay anxiety (of losing the pregnancy) by administering tabs. Phenobarbitone 30 to 60 mgs tds, morphine 10 mg"}, {"src": "BScN Paper I", "sec": "A GUIDE FOR BACHELOR OF SCIENCE (NURSING) LICENSING EXAMINAT", "txt": "losely associated with the quality of care you provide. You will explore various aspects of death and dying before being faced with the actual experience. You must understand your personal feelings about death and dying before you provide terminal care. If you neglect to do so, you will avoid involvement and remain detached. The most likely result of this attitude is that the dying person and the family will feel emotionally abandoned and are left to face a very frightening situation alone as yo"}, {"src": "BScN Paper II", "sec": "General", "txt": "levels of placental hormones to rise. These cause further uterine contractions. Mechanical Factors Uterine activity can also result from the mechanical stimulation of the uterus and cervix. This may be due to over stretching, as in the case of multiple pregnancy and polyhydromnios, or pressure from the presenting part, when it is well applied to the cervix. It appears that there is a combination of hormonal (from both mother and foetus) and mechanical factors that set labour in motion. Pre-Labou"}, {"src": "BScN Paper I", "sec": "A GUIDE FOR BACHELOR OF SCIENCE (NURSING) LICENSING EXAMINAT", "txt": "actice and experience, especially with relation to site selection and insertion. Selecting a Vein The choice of the site of a vein puncture varies with each patient. While selecting a vein you should consider the following factors: \u2022 Superficial veins are easily located and are more accessible for puncture. \u2022 Veins in the arm and hands are preferred to veins in the foot or leg. \u2022 Use veins in the arm or hand on the patient\u2019s non-dominant site. \u2022 At times, the choices available for possible sites"}, {"src": "BScN Paper II", "sec": "General", "txt": "ged. For more detailed information see the section on Care of Normal Puerperium. SECTION 2: ABNORMAL UTERINE ACTION Introduction Before you begin this section, it is recommended that you review the normal uterine function as you learnt it in the physiology of labour. This section explores abnormalities in uterine action, their causes and management. Post-Version Steps \u2022 Take the foetal heartbeat immediately after the version. For the first few minutes there may be alteration eration of the heart"}, {"src": "BScN Paper I", "sec": "SECTION 1: RESPIRATORY SYSTEM The Structures and Respiratory", "txt": "ll come in handy. Patient teaching is important during rehabilitation. They must know how to adjust their lifestyles to cope with their problem. Complications \u2022 Cardiac arrhythmias - this may range from simple tachycardia to complex ventricular rhythms especially when the conducting system has been involved. ECG changes will be involved. \u2022 Congestive heart failure occurs when pumping powers of the heart diminishes. \u2022 Cardiogenic shock will follow in adequate oxygen transport to the tissues. \u2022 Pa"}, {"src": "BScN Paper II", "sec": "General", "txt": "ent to change policies and laws that deny women equal ownership of family assets Encouraging women to join income generating activities with a view of increasing their economic status \u2022 Putting pressure on the government to punish all those individuals who misuse children through labour and force girls into early marriage Sexual Abuse/Violence Sexual violence has been defined as: \u2019any sexual act, attempt to obtain a sexual act, unwanted sexual comments or advances, or acts to traffic women\u2019s sex"}, {"src": "BScN Paper II", "sec": "SECTION 5: OBSTETRIC ANAESTHESIA, OPERATIONS AND EMERGENCIES", "txt": "of consecutive high temperature until the beginning of next menstrual bleeding. Note the following points when taking basal body temperature: \u2022 It should be taken first thing in the morning before rising \u2022 Temperature should be recorded within same hour \u2022 Note temperatures taken outside the hour \u2022 Note all disturbances, for example, all medications \u2022 Use the same thermometer for the entire cycle \u2022 Note the use of a new thermometer \u2022 If the reading stops between two numbers ignore the high one an"}, {"src": "BScN Paper II", "sec": "General", "txt": "ects on the baby. It is important for a midwife to advise the couple that sex is safe except in special conditions, for example, if a woman has had frequent miscarriages. Remember: While giving the health education, let the woman or couple raise their fears or concerns, as different people perceive pregnancy differently. Follow-up Antenatal Visits Can you think of the follow-up visits? The main aim of follow-up visits is to check the general health of the mother and to ascertain the rate of grow"}, {"src": "BScN Paper I", "sec": "SECTION 4: SPECIAL PROCEDURES AND INVESTIGATIONS Introductio", "txt": "terile suction catheters and spare sterile tracheotomy tubes of different sizes. Rehabilitation and Counselling Although counselling will be covered as a subject in module four, the role of rehabilitation and counselling in critical care nursing will be briefly covered here. You may agree that if a patient is either unconscious, on ventilation or dialysis machine, relatives experience some concern. The patient is also likely to have problems coping and adjusting after gaining full recovery. At t"}, {"src": "BScN Paper II", "sec": "SECTION 5: OBSTETRIC ANAESTHESIA, OPERATIONS AND EMERGENCIES", "txt": "it has become a habit. Around the world, successful prevention programmes among young people are ones that equip adolescents with the knowledge, skills and attitudes that will keep them safe from infection before they become sexually active. Alcohol and drug abuse increases HIV transmission risk. This is as a result of impaired judgement that may lead to unprotected sex. Other practices such as intravenous drug use, often associated with the developed world, and drug abuse in general should be d"}, {"src": "BScN Paper I", "sec": "SECTION 3: GENITOURINARY SYSTEM AND THE INTEGUMENTS Introduc", "txt": "een removed and the baby is feeding well orally, their discharge may be planned. Preoperative Care The infant should be nursed in the incubator, kept warm and given highly humidified oxygen to relieve respiratory distress and liquefy secretion. The infant\u2019s head should be slightly elevated and intermittent suction carried out both to the mouth, pharynx and proximal oesophageal pouch. The catheter may have to be changed daily by the doctor or irrigated with normal saline. At intervals the infant'"}, {"src": "BScN Paper I", "sec": "SECTION 4: SPECIAL PROCEDURES AND INVESTIGATIONS Introductio", "txt": "confer with the patient and get permission before consulting other counsellors. Counsellor Competence Competence is an essential element in counselling and is acquired through proper training and practice. The counsellor should, therefore, work within their known limits of competence and should not offer counselling services if their ability or objectivity is impaired due to personal or emotional difficulties, illness, alcohol, drugs, or for any other reason. The counsellor should refer any pati"}, {"src": "BScN Paper I", "sec": "SECTION 4: SPECIAL PROCEDURES AND INVESTIGATIONS Introductio", "txt": "or feel certain of a good grade. People often use the words fear and anxiety to describe the same thing. Fear also describes a reaction to immediate danger characterised by a strong desire to escape the situation. Anxiety develops as a result of a conflict between id, ego and super ego over the control of psychic energy. The physical symptoms of anxiety reflect a chronic 'readiness' to deal with some future threat Anxiety Symptoms Symptoms of anxiety may include: \u2022 Fidgeting \u2022 Muscle tension \u2022 S"}, {"src": "BScN Paper I", "sec": "SECTION 3: GENITOURINARY SYSTEM AND THE INTEGUMENTS Introduc", "txt": "drugs include: lopinavir, nelfinavir, and ritonavir. 4. Fixed drug combination. Assessment of the HIV Infected Infant Before initiating ARV therapy, HIV infected infants or children should be treated by paediatric HIV specialists. When this is not possible the treating clinician should seek consultation with a paediatric specialist. When a child is identified as HIV infected, the clinician should begin an immediate assessment of the child's clinical and immunological status, viral burden, resist"}, {"src": "BScN Paper I", "sec": "SECTION 3: GENITOURINARY SYSTEM AND THE INTEGUMENTS Introduc", "txt": "t is unable to cough up the secretions. For oral drinks, warm milk or warm lemon and honey are enjoyable and very effective. A light but nourishing diet should be given to older children while the young may benefit from dilute milk feeds. A fluid balance chart should always be maintained until the child is able to feed normally, pyrexia settles and general condition much improved. Antibiotics such as crystalline penicillin may be given every four to six hours in the first two to three days. This"}, {"src": "BScN Paper I", "sec": "SECTION 3: GENITOURINARY SYSTEM AND THE INTEGUMENTS Introduc", "txt": "ond the uppermost limit of normal at which a milestone should have been reached. Developmental Warning Signs Not smiling at mother Poor head control Unable to sit unsupported Not crawling Unable to stand with help Not babbling Unable to stand unaided Not walking independently Unable to understand commands Not using two to three words Age 8 weeks 6 months 9 months 12 months 12 months 12 months 15 months 18 months 2 years 2.5 years Factors that Promote Health The health of a growing child can be s"}, {"src": "BScN Paper IV", "sec": "General", "txt": "nuals, which are easily available in WHO and medical training college libraries. Introducing ICD 10 ICD10 is classified in the following manner. Organic, including symptomatic mental F0 disorders. Mental and behaviour disorders due to F1 psychoactive substance use. Schizophrenia, schizotypal and delusional F2 disorders. F3 Mood (affective) disorders. Neurotic, stress related and somatoform F4 disorders. Behavioural syndromes associated with F5 physiological disturbances and physical factors. Dis"}, {"src": "BScN Paper I", "sec": "A GUIDE FOR BACHELOR OF SCIENCE (NURSING) LICENSING EXAMINAT", "txt": "ugs such corticosteroids, oral contraceptives, narcotics and thiazide diuretics. Cholecystitis can be acute or chronic. If chronic, it can contribute to cancer of the gall bladder. Care of the Patient with Gall Bladder Disease The management of an adult with gall bladder disease should start with a primary assessment. The data will be obtained by finding out about the clinical presentation of the disease, which has already been mentioned. In those patients with gall bladder disease, it is advisa"}, {"src": "BScN Paper II", "sec": "SECTION 5: OBSTETRIC ANAESTHESIA, OPERATIONS AND EMERGENCIES", "txt": "scissors. Many procedures are now performed entirely or assisted by laparoscopy. A better view of the pelvis, lower abdomen and visceral contents is also facilitated by injection of a prescribed amount of CO\u00b2 intraperitoneally into the cavity (insufflation). This separates the intestine from the pelvic organs. The e procedure is performed under general anaesthesia, meaning patients have to be prepared preoperatively. The patient is carefully observed for several hours to detect any complications"}, {"src": "BScN Paper II", "sec": "SECTION 5: OBSTETRIC ANAESTHESIA, OPERATIONS AND EMERGENCIES", "txt": "ng soiled linen, treatment of pressure areas, and turning the patient regularly, minimising the risk of skin breakdown such as pressure sores Being available for the patient for physical comfort and psychological support Counselling and Psycho Spiritual Care This component of the caring process includes reducing stress and anxiety for both the patient and family members, promoting positive living, and helping individuals to make informed decisions on HIV testing, plan for the future and behaviou"}, {"src": "BScN Paper I", "sec": "SECTION 3: GENITOURINARY SYSTEM AND THE INTEGUMENTS Introduc", "txt": ", delirium and dementia, mouth ulcers, skin problems and sometimes constipation. About 30,000 new cases of cancer are diagnosed each year However, in many developing countries, this is a forgotten disease, such that when one is diagnosed, the disease will be advanced and there will be few resources to fight it. The main symptoms of cancer include pain, wasting, anaemia, anxiety, depression, skin problems, and infections among others. In this unit you have already covered several neoplasms affect"}, {"src": "BScN Paper I", "sec": "A GUIDE FOR BACHELOR OF SCIENCE (NURSING) LICENSING EXAMINAT", "txt": "and mucous membrane. Yellow Jaundice Is due to increased bile pigments in blood. Is the result of a decrease in the number of red blood cells (anaemia)? Large or small and are the result of ruptured blood Dark purple Purpura vessels, either because of trauma or a systemic areas infection Skin lesions can be single or multiples. They When undertaking the eye examination: can be small or large as well as different in \u2022 Observe eyes for position and alignment to colour, size, shape and skin layer i"}, {"src": "BScN Paper II", "sec": "General", "txt": "ateral flexion of the body: \u2022 Place one hand above and one below the foetal head Depress the head gently toward the anus/neck, making sure it is neither twisted nor bent sideways till the anterior shoulder is free Remind your assistant to give syntometrine 0.5mg intramuscularly (in a single dose) Guide the head upwards in the direction of the mother's abdomen The delivering of posterior shoulder Ask your assistant to continue with the immediate care of the baby Continue with the delivery of the "}, {"src": "BScN Paper I", "sec": "SECTION 3: GENITOURINARY SYSTEM AND THE INTEGUMENTS Introduc", "txt": "emperature. They can also control chest pain, which the patient may complain of. Complications These may develop if the child was brought to the hospital too late. Similarly, inadequate use of antibiotics may lead to complications occurring. The most common ones are chronic bronchitis and broncho pneumonia. Laryngo Tracheo Bronchitis (LTB) This is a combined inflammatory disease process, which affects the larynx, trachea and bronchi simultaneously. Infections of the respiratory tract are general"}, {"src": "BScN Paper II", "sec": "General", "txt": "you to provide good quality antenatal care, you must achieve the following aims: Maternal mortality refers to the death of the mother during pregnancy or within 42 days after the termination of pregnancy. The cause may be related to or aggravated by pregnancy, labour or puerperium. Data from the 2003 Kenya Demographic Health Survey (KDHS) estimated maternal mortality ratio at 414 maternal deaths per 100,000 live births. Perinatal mortality includes stillbirths, which is the death of the foetus a"}, {"src": "BScN Paper II", "sec": "General", "txt": "ine or menstrual blood. The girl\u2019s legs are bound together from hip to ankle and All of these operations present serious consequences to the reproductive health for girls and women. The Potential Health Consequences of FGM \u2022 Medical complications such as haemorrhage, pain, pelvic infection, and painful intercourse \u2022 Complications of childbirth such as obstructed labour due to scarring of tissues. In some communities the husband must give consent before an episiotomy can be performed \u2022 The proced"}, {"src": "BScN Paper IV", "sec": "SECTION 1: CONCEPTS AND CONTRIBUTION OF RESEARCH Introductio", "txt": "the best style depends on the situation. If one is leading troops in the Persian Gulf, an autocratic style is probably best (of course, many might argue here, too). If one is leading a hospital or university, a more participative and facilitative leadership style is probably best. SECTION 2: LEADERSHIP Introduction As a practising nurse, you will spend most of your working life in health care institutions at all levels, from staff nurse to the highest positions of responsibility. Whatever your r"}, {"src": "BScN Paper I", "sec": "SECTION 3: GENITOURINARY SYSTEM AND THE INTEGUMENTS Introduc", "txt": "iscosity, hence thrombophlebitis, emboli or stroke (cerebral vascular accident). Clinical Features \u2022 Cyanosis, which may be mild or severe and occur depending on the degree of the defect. If blood shunts from the right side to the left side of the heart, the cyanosis will be more marked and noticeable on the mucous membranes of the lips, mouth, pharynx and fingernails. \u2022 Dyspnoea, due to pulmonary oedema and increased carbon-dioxide level in the blood (systemic anoxia). \u2022 Polycythaemia (excessiv"}, {"src": "BScN Paper II", "sec": "SECTION 5: OBSTETRIC ANAESTHESIA, OPERATIONS AND EMERGENCIES", "txt": "with constipation. Obese ese patients should be advised to try and lose weight. Prognosis of Uterine Prolapse Vaginal hysterectomy with anteroposterior colporrhaphy provides excellent and permanent vaginal support and if good healing occurs, preservation of vaginal functions as well. Recurrence may result from unrepaired cystocele and rectocele or from occupational factors such as heavy lifting or straining. You will now move on to the final part of this section and look at traumatic disorders o"}, {"src": "BScN Paper I", "sec": "SECTION 4: SPECIAL PROCEDURES AND INVESTIGATIONS Introductio", "txt": "ith them. \u2022 Give recommendations or suggestions on what the authority should do. Indicate the decisions you want the authority/MOH to rectify and emphasise ideas which help the reader to come up with solutions to the problems. A Health Centre Report consists of four main sections. \u2022 Total number New members Resignations Transfers Retirees Sick leave Staff on leave Cadres of Staff \u2022 Clinical officers \u2022 Laboratory technicians \u2022 Public Health Technicians \u2022 Enrolled Community Health Nurses \u2022 Enrolle"}, {"src": "BScN Paper I", "sec": "SECTION 3: GENITOURINARY SYSTEM AND THE INTEGUMENTS Introduc", "txt": "ommon problem among children, mostly seen in clinics and outpatient departments. Can you think of the factors that might cause this condition? The Most Common Causes \u2022 Infections such as meningitis \u2022 Brain abscess \u2022 Malaria and other febrile conditions, which lead to infections, unrelated to the central nervous system (about 10% of children in the tropics who are seen in hospitals suffer from febrile convulsions) \u2022 Encephalitis \u2022 Otitis media \u2022 Congenital malformation of the central nervous syst"}, {"src": "BScN Paper II", "sec": "General", "txt": "s absorption occurs, but this may take several weeks. No treatment is necessary. Injuries to the Head Injuries to the head may vary from minor skin abrasions to severe internal haemorrhage. \u2022 Premature labour \u2022 Face to pubes presentation \u2022 Breech delivery \u2022 Asphyxia neonatorum Signs of intracranial injury that will be manifested depend on the severity of the condition. On the other hand, the infant may not show all the signs. Skull Fracture This is rarely seen nowadays. Skull fractures used to o"}, {"src": "BScN Paper I", "sec": "A GUIDE FOR BACHELOR OF SCIENCE (NURSING) LICENSING EXAMINAT", "txt": "orm and check the information itemised. Nursing Responsibilities Patient's Death You should always remember that you are still involved with both the patient and the family even after death occurs. The relatives may wish to view the body if the death occurred in their absence. You should ask them if they would wish to be left alone or if they do not mind you accompanying them. If the former, do not be too distant. It is human for you to become involved and attached to patients and their families"}, {"src": "BScN Paper II", "sec": "General", "txt": "so that its long axis fits in this more accommodating anteroposterior diameter. Pelvic Assessment It is very important for you to understand how to assess the landmarks and measurements of the female pelvis. This is because it will help you to anticipate complications that may occur during delivery so that you can take the appropriate action to save the mother and child. The adequacy of the pelvis can be judged clinically through a vaginal examination. Three diameters are measured: The Pelvic Ou"}, {"src": "BScN Paper I", "sec": "A GUIDE FOR BACHELOR OF SCIENCE (NURSING) LICENSING EXAMINAT", "txt": "capillaries from the large intestine are mineral salts, vitamins and some drugs. Microbial activity There are micro-organisms which colonise the large intestine and they synthesise vitamin K and folic acid. Examples are Escherichia coli, enterobacter aerogenes, streptococcus faecalis and clostridium perfringens. The micro-organisms also breakdown proteins which were not digested in the small intestines and amino acids which are produced are deaminated and ammonia is transported to the liver for "}, {"src": "BScN Paper II", "sec": "SECTION 5: OBSTETRIC ANAESTHESIA, OPERATIONS AND EMERGENCIES", "txt": "\u2022 Sexual contact \u2022 Blood transfusion \u2022 Vertical transmission \u2022 Physical contact The clinical features will depend on the stage of infection the patient presents himself or herself in. As mentioned earlier, there are four stages of syphilis namely primary, secondary, latent and tertiary. The stages of infection will be addressed individually. Primary Syphilis After an incubation period of 10 to 90 days, a primary chancre develops at the site of inoculation. The chancre is typically painless, indu"}, {"src": "BScN Paper I", "sec": "SECTION 3: GENITOURINARY SYSTEM AND THE INTEGUMENTS Introduc", "txt": "es than the females. The thickening of the semilunar valves results in stenosis. Pathophysiology The aortic stenosis causes over dilation of the left ventricle and back flow of blood to the left atrium via the mitral valve. The backpressure is further extended to the pulmonary veins resulting in pulmonary vascular congestion. Clinical features of the condition include: \u2022 Growth failure in severe cases but could be normal in mild cases \u2022 Cardiomegally, more marked on the left side of the heart Th"}, {"src": "BScN Paper I", "sec": "A GUIDE FOR BACHELOR OF SCIENCE (NURSING) LICENSING EXAMINAT", "txt": "gland or body \u2022 1 Thymus gland \u2022 2 Ovaries in the female \u2022 2 Testes in the male The Pituitary Gland and the Hypothalamus The pituitary gland lies within the sella turcica, a depression within the sphenoid bone, inferior to the hypothalamus. You have learnt that it is composed of three lobes, the posterior, anterior and middle lobes. The pituitary gland and the hypothalamus act as a unit. The hypothalamus has a direct controlling effect on the pituitary gland and an indirect effect on many others"}, {"src": "BScN Paper II", "sec": "General", "txt": "as they are beliefs, ideas or principles that determine who you are and how you behave. For example, a person who values their family cares about their spouse, children and home life. A person who values education will study hard and pass examinations. Thus values dictate the behaviour of individuals. The individual learns to make decisions consistent with personal values. Values are held dear and encourage self esteem in the individual. Note that you will cover this topic in greater detail in t"}, {"src": "BScN Paper I", "sec": "SECTION 3: MANAGEMENT OF CRITICALLY ILL PATIENTS Introductio", "txt": "te salt and water, care must be exercised in administering fluid to the patient. Radio-contrast agents must be avoided. Since drugs or metabolites often accumulate in renal failure, the administration of drugs should be avoided as much as possible."}, {"src": "BScN Paper I", "sec": "A GUIDE FOR BACHELOR OF SCIENCE (NURSING) LICENSING EXAMINAT", "txt": "es should not be left soaking indefinitely or stored in a disinfectant solution. During your nursing practice you have probably been performing several sterile procedures such as: \u2022 Wound dressing \u2022 Administration of an injection \u2022 Removing stitches, staples and clips \u2022 Shortening or removing drains \u2022 Urinary catheterisation \u2022 Surgical asepsis in an operating room Aseptic can be defined as \"free from sepsis or germ free\". A technique is a method or skill used for a particular task or technical p"}, {"src": "BScN Paper II", "sec": "SECTION 5: OBSTETRIC ANAESTHESIA, OPERATIONS AND EMERGENCIES", "txt": "tached. Subcute and chronic refer to an inversion, which happens 24 hours later. The predisposing causes of acute inversion of the uterus: \u2022 Management of third stage of labour \u2022 Combining fundal pressure and cord traction while conducting third stage \u2022 Use of fundal pressure before separation of placenta \u2022 Placenta acreta \u2022 Unknown cause, such as when the prolapse happens spontaneously \u2022 Sudden emptying of the gravid uterus \u2022 Short cord How can you diagnose acute inversion of the uterus? How to"}, {"src": "BScN Paper I", "sec": "A GUIDE FOR BACHELOR OF SCIENCE (NURSING) LICENSING EXAMINAT", "txt": "lurring Ears Hearing Pain Infection Excessive cerumen Hygiene practices Tinnitus terms of presence or absence of symptoms, past or present. It serves as a check and balance so as to prevent you from overlooking any relevant data. You should record negative and positive responses. Taking into account the history of present illness, analyse the symptom the patient has responded positively to. You should get an overview of general health as well as symptoms related to each body system. You could us"}, {"src": "BScN Paper II", "sec": "SECTION 5: OBSTETRIC ANAESTHESIA, OPERATIONS AND EMERGENCIES", "txt": "to the Centre for Disease Control (CDC), the average time between HIV infection and appearance of signs that could lead to an AIDS diagnosis is eight to ten years. This time varies greatly from person to person and can depend on many factors including the person\u2019s health status and sexual behaviour. Once an adult develops AIDS, the time of death varies from a few months to about two years if no antiretroviral treatment is given. In children (mother to child transmission) the progression is faste"}, {"src": "BScN Paper II", "sec": "General", "txt": "n the baby unit for management after the resuscitative measures are carried out. Induction of Labour in a Diabetic Mother To induce labour, artificial rupture of the membranes is done and oxytocin is put in normal saline, which is regulated depending on the uterine contractions. For the nutritional needs and to prevent hypoglycaemia, a drip of 10% dextrose is set up and regulated at 20 drops per minute. Soluble insulin is given by syringe pump at six units in 60ml of normal saline. This is regul"}, {"src": "BScN Paper II", "sec": "General", "txt": "erineum usually means \u2022 Bulging delivery is imminent Management of Normal Labour Can you recall the equipment you will need during the second stage of labour? You will need a trolley with a top and bottom shelf. Lateral Flexion Following these movements the body bends sideways to follow the curve of the birth canal. The anterior shoulder escapess under the symphysis pubis and the posterior shoulder sweeps the perineum. The body of the baby is born by lateral flexion. To recap, the cardinal movem"}, {"src": "BScN Paper II", "sec": "SECTION 5: OBSTETRIC ANAESTHESIA, OPERATIONS AND EMERGENCIES", "txt": "metoclopramide. Refer for further investigation if there is dehydration; severe Remember: Home based care continues even after the disease has progressed beyond what medicine can cure, that is, the terminal stage and after death, where the person should be given a decent burial, not forgetting the people left, especially children, since they will need lots of support and assistance."}, {"src": "BScN Paper IV", "sec": "General", "txt": "hearing voices. \u2022 Visual hallucinations. \u2022 Withdrawal from others. \u2022 Illusions. Disturbed sleep (reversal of sleep patterns). \u2022 Autonomic features, for example, sweating, tachycardia. Some of the main causes of this condition have been identified as: \u2022 Alcohol intoxication or withdrawal. \u2022 Drug intoxication, overdose or withdrawal. \u2022 Infection. \u2022 Metabolic changes, for example, liver disease, dehydration, hypoglycaemia. \u2022 Head trauma. \u2022 Hypoxia. \u2022 Epilepsy. Medication for Delirium When prescribi"}, {"src": "BScN Paper I", "sec": "SECTION 3: GENITOURINARY SYSTEM AND THE INTEGUMENTS Introduc", "txt": "esophagus and a tracheo oesophageal fistula with associated oesophageal atresia. Clinical Features Gastric reflux into the trachea will occur, causing inhalation of secretions and hydrochloric acid, resulting in ulceration of the mucous membrane. The baby will persistently cough and choke due to aspiration of gastric content. This may lead to the development of pneumonia. Cyanosis is present and respiration disturbed. Management of the condition necessitates surgical repair. As the condition imp"}, {"src": "BScN Paper I", "sec": "SECTION 3: GENITOURINARY SYSTEM AND THE INTEGUMENTS Introduc", "txt": "lves removal of narrow areas followed by anastomosis. Prognosis is usually good. from the left side of the heart or an abnormal opening between the atria, allowing blood from the higher pressure left atrium to flow into the lower pressure right atrium. This results in increased right ventricular output and pulmonary engorgement. This condition is usually discovered on routine medical examination when systolic pressure is found to have a blowing murmur in the area of pulmonary artery. Children su"}, {"src": "BScN Paper II", "sec": "SECTION 5: OBSTETRIC ANAESTHESIA, OPERATIONS AND EMERGENCIES", "txt": "r. \u2022 The user may have an allergy to rubber. \u2022 There is a failure rate of 2-15%. It should be used only once and discarded. Precautions should always be taken. Advise patients to check the expiry date and to ensure proper storage, use and disposal. \u2022 Diaphragm This is a dome shaped rubber device with a flexible rim inserted into the vagina prior to sexual intercourse to prevent conception by forming a barrier. It has to be removed six to eight hours after intercourse. Diaphragms are of different"}, {"src": "BScN Paper I", "sec": "SECTION 3: GENITOURINARY SYSTEM AND THE INTEGUMENTS Introduc", "txt": "aemia, infections and haemorrhage. There are several causes of aplastic anaemia. Suppression of the bone marrow to produce adequate red blood cells Primary bone marrow failure of unknown root Toxic preparations, including drugs like chloramphenical and phenylbutazone Metallic substances, such as lead and gold also fall under this category Chronic or extensive infections such as osteomyelitis, carcinoma of the bones, tuberculosis of the bones Over exposure to radiation, x-rays, radioactive substa"}, {"src": "BScN Paper II", "sec": "General", "txt": "ternal circulation, it will stimulate the formation of antibodies by the mother. The first born is not usually affected unless the mother had previously undergone an abortion. During the third stage of labour, when the placenta is being delivered, the maternal and foetal blood mixes, and the mother\u2019s body is sensitised against the baby\u2019s blood. There are antibodies circulating in the mother\u2019s blood due to this sensitisation. If the mother conceives again and the foetus is Rhesus positive, then t"}, {"src": "BScN Paper II", "sec": "General", "txt": "ld be obvious to you that gender issues have significant impacts on reproductive health, including: homicide, serious injuries to the victim and dependants (children), STD\u2019s/HIV/AIDS, unwanted pregnancies, mental health problems and suicide. The different health impacts can be grouped into three categories: \u2022 Physical \u2022 Psychological \u2022 Social Each of these categories is explored in detail in the following pages. Physical Consequences Unwanted and Early Pregnancy This can either be through rape o"}, {"src": "BScN Paper II", "sec": "General", "txt": "and re-emphasise the importance of attending maternal and child health clinics. SECTION 2: THE NEONATE Introduction In this section you will focus on the new life, that is the neonate, who is now an independent being outside the mother\u2019s womb. \u2018Neo\u2019 means, new, hence the term \u2018neonate\u2019 means newborn. The neonatal period is the first four weeks after birth. A neonate can be classified as, preterm, full term or post term. Objectives By the end of this section, you will be able to: \u2022 Describe the p"}, {"src": "BScN Paper IV", "sec": "General", "txt": "discovered and later abandoned like hydrotherapy, insulin therapy and leucotomy. The current forms of treatments include physical treatment like chemotherapy and electroconvulsive therapy. There are also various psychological treatments, which include: \u2022 Individual/group psychotherapy \u2022 Behaviour therapy \u2022 Occupational therapy \u2022 Rehabilitation \u2022 Cognitive therapy \u2022 Counselling Some of these treatments will be covered in more detail in section two of this unit The scientific period witnessed the "}, {"src": "BScN Paper I", "sec": "SECTION 4: SPECIAL PROCEDURES AND INVESTIGATIONS Introductio", "txt": "\u2022 Marital or family disputes \u2022 Those who need abortion or have procured abortion People requiring reproductive health/family planning assistance Those experiencing sex difficulties/importence Retirees Retrenchees Qualities of a Good Counsellor Patience A good counsellor should be very patient with their patient, no matter how many times the patient repeats themselves. You should not hurry the patient at all or show impatience. Nor should you show you are bored or tired of holding long discussion"}, {"src": "BScN Paper I", "sec": "A GUIDE FOR BACHELOR OF SCIENCE (NURSING) LICENSING EXAMINAT", "txt": "\u2022 Provide time for the patient to perceive confirm or deny the interpretations. Pace the conversation, but do not press the patient to communicate. Too slow a response may be equated with disinterest. Firing questions may be associated with insensitivity. Accepting Reality There comes a time when it becomes apparent that death will no longer be delayed. The patient and their family will find comfort in knowing this. The patient's discomfort is eased if they can express how meaningful and appreci"}, {"src": "BScN Paper IV", "sec": "General", "txt": "obi, however, this community sticks together and helps one another as necessary. Mobility that is not structural is called exchange mobility. The word exchange indicates a tradeoff. In exchange mobility, some people rise to fill positions made available because other people have fallen in the status system. There is little exchange mobility when the ascriptive status rule operates, but if status depends on achievement, there is a fair amount of such movement. Many children of talented and ambiti"}, {"src": "BScN Paper I", "sec": "A GUIDE FOR BACHELOR OF SCIENCE (NURSING) LICENSING EXAMINAT", "txt": "or two years. The Narcotic Drugs and Psychotropic Substances (Control) Act, 1994 This is an Act of Parliament to make provision with respect to the control of the possession of, and trafficking in, narcotic drugs and psychotropic substances and cultivation of certain plants, to provide for forfeiture of property derived from, or used in, illicit traffic narcotic drugs and psychotropic substances and for connected purposes. The Act sets up an Advisory Council to review any drugs likely to be misu"}, {"src": "BScN Paper I", "sec": "SECTION 3: GENITOURINARY SYSTEM AND THE INTEGUMENTS Introduc", "txt": "children the disease resembles rickets and in adults it resembles osteomalacia. What complications can you think of that are associated with obesity? \u2022 Orthopaedic, that is, tibia vara (bow legs) and slipped femoral epiphysis Clinical Features \u2022 Growth retardation \u2022 Muscle weakness \u2022 Bone pain \u2022 Skeleton deformities \u2022 Slipped epiphyses The areas of the body most commonly affected are the joints, eyes, muscles, myocardium, lungs and blood vessels. The latter can lead to gangrene of fingers and to"}, {"src": "BScN Paper I", "sec": "SECTION 4: SPECIAL PROCEDURES AND INVESTIGATIONS Introductio", "txt": "ng abortion \u2022 Fearing they may hate the child if the pregnancy is not terminated \u2022 Wondering why it had to be them As you conduct the interview, continue observing the emotional behaviour displayed by the patient through non-verbal communication. Emotional Behaviours Displayed by Rape Victims \u2022 They may be physically restless \u2022 May keep on crossing and uncrossing their legs \u2022 May keep on rubbing their head, thighs or back \u2022 Wiping their tears with their hands or not wiping their tears at all \u2022 O"}, {"src": "BScN Paper II", "sec": "SECTION 5: OBSTETRIC ANAESTHESIA, OPERATIONS AND EMERGENCIES", "txt": "tives By the end of this section, you will be able to: \u2022 Describe history taking List various tests and gynaecological radiographic diagnostic procedures Gynaecological History History taking should place an emphasis on the gynaecological history of the patient. This does not mean that other histories should be ignored. For the sake of minimising repetition, you will not go through the whole process. When taking a gynaecological history, you should enquire into the following: Menstruation Menstr"}, {"src": "BScN Paper II", "sec": "SECTION 5: OBSTETRIC ANAESTHESIA, OPERATIONS AND EMERGENCIES", "txt": "se start management as follows: \u2022 Keep the patient warm \u2022 Give fresh whole blood \u2022 Give fresh frozen plasma \u2022 Give platelets concentrates This type of care may not be available in small health institutions hence the need for referral. If bleeding persists utero-ovarian artery ligation or subtotal hysterectomy should be considered. Secondary Post Partum Haemorrhage This usually occurs 24 hours after delivery or up to six weeks post delivery. The mother may present with retention of a placenta pie"}, {"src": "BScN Paper I", "sec": "A GUIDE FOR BACHELOR OF SCIENCE (NURSING) LICENSING EXAMINAT", "txt": "h experiences as seeing a child graduate from school enjoying his next birthday. \u201cYes me,\u201d the patient feels sadness and often cries as though they is mourning their own death. \u201cI am ready\u201d. A positive feeling and a readiness characterise the comment for death. This stage is usually peaceful and tranquil. Note that not all persons go through these stages in the order described in the Stages of Dying table. A person may skip one of those stages, or fall back a stage. Stages may overlap. The lengt"}, {"src": "BScN Paper I", "sec": "A GUIDE FOR BACHELOR OF SCIENCE (NURSING) LICENSING EXAMINAT", "txt": "sing the formula above 125 ml x 20 drops/ml = 41.67 = 42 drops per minute 60 min You should then count the number of drops falling into the drip chamber of the tubing per minute. By adjusting the regulator clamp, the number of drops per minute will be increased or decreased until the infusion matches the rate you calculated, i.e. 42 drops per minute. Monitoring the Rate of Infusion It is important to maintain the proper rate of flow because too slow a flow may not meet the patient's needs for fl"}, {"src": "BScN Paper II", "sec": "SECTION 5: OBSTETRIC ANAESTHESIA, OPERATIONS AND EMERGENCIES", "txt": "es while if on the upper half there is continuous passage of faeces per vaginum. Management of VVF and RVF First and foremost, prevention is easier than cure. In most cases fistulae formation can be avoided by: \u2022 Ensuring that labour does not go beyond 12 hours. \u2022 Frequent emptying of bladder or catheterisation during normal labour since a distended bladder is easily traumatised by the pressure of the presenting part, especially in cephalic presentation. \u2022 Control of infection and excoriation (u"}, {"src": "BScN Paper II", "sec": "SECTION 5: OBSTETRIC ANAESTHESIA, OPERATIONS AND EMERGENCIES", "txt": "me, the excessive production of cortisols may hinder menstruation from starting. Developmental Anomalies During the development of the foetus, the vagina, uterus or ovaries may fail to develop. The congenital abnormality in the vagina that causes primary amenorrhoea is an imperforate hymen. In this case, the girl experiences all the feelings and discomforts of menstrual flow. There is actually menstruation and the blood accumulates behind the hymen, (in the vagina), but does not come out. This c"}, {"src": "BScN Paper I", "sec": "SECTION 3: GENITOURINARY SYSTEM AND THE INTEGUMENTS Introduc", "txt": ", and the use of accutane (a drug used in some places in the treatment of acne). Diagnostic Investigations Cleft lip can easily be diagnosed just by observation, but care should be taken to determine whether it is simply confined to the lip or if it is more extensive. Cleft palate can rarely be confirmed by observation. The doctor or nurse/midwife may have to insert their gloved fingers into the mouth and palpate for any incomplete fusions in the roof of the infant\u2019s mouth. Occasionally, an x-ra"}, {"src": "BScN Paper II", "sec": "SECTION 5: OBSTETRIC ANAESTHESIA, OPERATIONS AND EMERGENCIES", "txt": "You are now in the fifth section of this unit on labour. In the previous section you learnt that abnormal labour presents special challenges and carries many risks. This is why you should refer such women to the doctor in the prenatal clinic during their third trimester. They should also be advised to deliver in the hospital, as they may need a caesarean section. In this section, you will study obstetric anaesthesia, operations and emergencies. Urinary Tract Infection Pyelonephritis occurs in a "}, {"src": "BScN Paper II", "sec": "General", "txt": "ginal orifice. Vaginal bleeding may be due to excessive hormones from the mother Neurological Assessment This entails the checking of reflexes, which deal with the function of the baby\u2019s nervous system as well as physical and behavioural assessments. At the beginning of the examination, observe the baby\u2019s movements. These movements involve all extremities and should be random and symmetrical but never stereotyped. Sometimes jitteriness or tremors will be noted. The first time you notice these mo"}, {"src": "BScN Paper II", "sec": "SECTION 5: OBSTETRIC ANAESTHESIA, OPERATIONS AND EMERGENCIES", "txt": "the basal layer along with blood from the capillaries and the unfertilised ovum. The Menstrual Cycle Failure of fertilisation results in menstruation. This discharge is shed from the endometrium. It consists not only of blood but also debris from the uterine wall in the form of mucus and fragments. The menstrual cycle is defined as a series of physiological changes directly related to the development, regression and shedding of the endometrium under various hormonal influences. The monthly cycle"}, {"src": "BScN Paper IV", "sec": "General", "txt": "d the condition is usually found in men (Gayford, cited by Gelder et al., 2000). The treatment approach that has been found to be most effective is a combination of counselling and behavioural techniques. Counselling deals with personal relationships while behaviour deals with self-monitoring. Self-monitoring involves the identification of circumstances that initiated the behaviour so as to avoid them. Drugs that reduce sexual drive like cyproterone acetate have also been used, however, they are"}, {"src": "BScN Paper I", "sec": "SECTION 4: SPECIAL PROCEDURES AND INVESTIGATIONS Introductio", "txt": "re, it is important for health workers to be aware of unconscious communication. The Communication Process Consider the communication process, what takes place when you have a conversation or exchange letters with another person? What are the elements involved? What can go wrong? Make a note of your thoughts and then compare your answer with the following definition defi of the communication process. The communication process can easily be defined as the passing of information from the sender to"}, {"src": "BScN Paper I", "sec": "SECTION 3: GENITOURINARY SYSTEM AND THE INTEGUMENTS Introduc", "txt": "losis. Children under the age of two years are more susceptible than older ones. The pulmonary type of infection makes up to 90% of the total number of patients suffering from tuberculosis. The remaining 10% are extrapulmonary and this condition affects other body organs as you have seen earlier. In developing countries, where there is a lack of facilities for pasteurisation of milk, the extra-pulmonary tuberculosis is just as common as that of the lungs. Usually for children the most common app"}, {"src": "BScN Paper II", "sec": "SECTION 5: OBSTETRIC ANAESTHESIA, OPERATIONS AND EMERGENCIES", "txt": "c organs. \u2022 Sudden death due to extreme syncope as a result of dilatation of the cervix and in some cases from amniotic embolism. Remember: According to the laws of this country, induced abortion is a criminal offence, unless it is done on medical grounds. The illustration below shows the outcome of therapeutic and threatened abortions. Note that threatened abortions are usually spontaneous. Post-Abortal Care (PAC) PAC comprises the comprehensive health care provided to patients with problems of"}, {"src": "BScN Paper I", "sec": "SECTION 7: DISEASES OF THE NERVOUS AND ENDROCINE SYSTEMS Int", "txt": "the eardrum is lost and bulges outwards. \u2022 Hearing may be temporarily impaired. Diagnostic Investigations There are a number of simple investigations, which will confirm the diagnosis. Begin with a personal history from the parents or guardians of the child. A physical examination, to include the ears, throat and cervical lymph nodes, should be undertaken. Additionally, take pus swabs for culture and sensitivity from the discharging ears. Nursing Care Due to severe pain, pyrexia and discomfort, "}, {"src": "BScN Paper IV", "sec": "SECTION 4: MANAGING RESOURCES, CHANGE HEALTH INFORMATION SYS", // TF-IDF ENGINE
// ═══════════════════════════════════════════════════════════
const STOPS = new Set(['the','a','an','is','in','of','to','and','or','for','with','that','this','are','was','were','be','been','by','from','on','at','as','it','its','not','but','have','has','had','will','would','can','could','should','may','which','who','what','when','where','how','all','each','their','they','them','do','did','does','also','more','most','some','such','than','then','these','those','into','about','during','between','through']);
function tok(t){return t.toLowerCase().replace(/[^a-z0-9\s]/g,' ').split(/\s+/).filter(w=>w.length>2&&!STOPS.has(w))}
const chunkToks=KB.map(c=>tok(c.txt+' '+c.sec));
const df={};const N=KB.length;
chunkToks.forEach(ts=>{new Set(ts).forEach(t=>{df[t]=(df[t]||0)+1;})});
function vec(ts){const tf={};ts.forEach(t=>tf[t]=(tf[t]||0)+1);const tot=ts.length||1;const v={};Object.entries(tf).forEach(([t,c])=>{if(df[t])v[t]=(c/tot)*(Math.log((N+1)/(df[t]+1))+1)});return v}
const chunkVecs=chunkToks.map(vec);
function cos(v1,v2){const c=Object.keys(v1).filter(k=>v2[k]);if(!c.length)return 0;const d=c.reduce((s,k)=>s+v1[k]*v2[k],0);const n1=Math.sqrt(Object.values(v1).reduce((s,x)=>s+x*x,0));const n2=Math.sqrt(Object.values(v2).reduce((s,x)=>s+x*x,0));return(n1&&n2)?d/(n1*n2):0}
function retrieve(q,k=5){const qv=vec(tok(q));return chunkVecs.map((cv,i)=>({i,s:cos(qv,cv)})).sort((a,b)=>b.s-a.s).slice(0,k).filter(x=>x.s>.03).map(x=>({...KB[x.i],score:x.s}))}

async function callAI(query, evidence){
  const ctx=evidence.map((c,i)=>`[Source ${i+1}: ${c.src} — ${c.sec}]\n${c.txt}`).join('\n\n---\n\n');
  const p=`You are an expert NCK BScN exam assistant. Student asked: "${query}"\n\nTEXTBOOK EVIDENCE:\n${ctx}\n\nReturn ONLY valid JSON:\n{"concept_summary":"2-3 sentences","key_facts":["fact1","fact2","fact3","fact4"],"alternative_questions":[{"q":"text","type":"recall","difficulty":"easy","answer":"ans","explanation":"why"},{"q":"MCQ: Which... A. B. C. D.","type":"MCQ","difficulty":"medium","answer":"B. correct","explanation":"why"},{"q":"text","type":"application","difficulty":"medium","answer":"ans","explanation":"why"},{"q":"MCQ: Which... A. B. C. D.","type":"MCQ","difficulty":"hard","answer":"A. correct","explanation":"why"},{"q":"text","type":"analysis","difficulty":"hard","answer":"ans","explanation":"why"},{"q":"text","type":"recall","difficulty":"easy","answer":"ans","explanation":"why"}],"related_concepts":["c1","c2","c3","c4","c5"]}\n\nBase all answers on textbook evidence. NCK exam style. Return ONLY JSON.`;
  const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1200,messages:[{role:'user',content:p}]})});
  const d=await r.json();
  return JSON.parse((d.content?.[0]?.text||'{}').replace(/```json|```/g,'').trim());
}

function startTimer(){
  timeLeft=30;
  clearInterval(timerID);
  timerID=setInterval(()=>{
    timeLeft--;

    if(el){el.textContent=timeLeft+'s';if(timeLeft<=8)el.style.color='var(--red)'}
    if(timeLeft<=0){clearInterval(timerID);autoReveal();}
  },1000);
}

function autoReveal(){
  if(answered)return;
  answered=true;
  const q=quizPool[qIdx];
  document.querySelectorAll('.opt-btn').forEach((b,i)=>{b.disabled=true;if(i===q.ans)b.classList.add('reveal')});
  if(quizMode!=='exam'){
    const box=document.getElementById('expBox');
    if(box)box.innerHTML=`<div style="padding:0 22px 16px"><div class="explanation no"><div class="ex-label">⏰ Time's up — Correct Answer</div>${q.opts[q.ans]}${q.exp?`<div style="margin-top:6px;opacity:.8">${q.exp}</div>`:''}</div></div>`;
  }
  const nb=document.getElementById('nextBtn');
  if(nb)nb.style.display='';
}

function choose(i,isOk){
  if(answered)return;
  clearInterval(timerID);
  answered=true;
  const q=quizPool[qIdx];
  document.querySelectorAll('.opt-btn').forEach(b=>b.disabled=true);
  if(isOk){document.getElementById('opt'+i).classList.add('correct');score++;}
  else{document.getElementById('opt'+i).classList.add('wrong');document.getElementById('opt'+q.ans).classList.add('reveal')}

  if(quizMode!=='exam'){
    const box=document.getElementById('expBox');
    if(box)box.innerHTML=`<div style="padding:0 22px 16px"><div class="explanation ${isOk?'ok':'no'}">
      <div class="ex-label">${isOk?'✓ Correct!':'✗ Incorrect — '}</div>

      ${q.exp?`<div style="margin-top:${isOk?'0':'6px'}">${q.exp}</div>`:''}
    </div></div>`;
  }
  const nb=document.getElementById('nextBtn');
  if(nb)nb.style.display='';
}
