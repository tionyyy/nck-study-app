<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NCK BScN Study Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07090f;
  --s1:#0e1118;
  --s2:#141824;
  --s3:#1c2235;
  --s4:#232b40;
  --b1:rgba(90,130,255,0.10);
  --b2:rgba(90,130,255,0.20);
  --b3:rgba(90,130,255,0.30);
  --acc:#5a82ff;
  --acc2:#7fa4ff;
  --acc-d:rgba(90,130,255,0.14);
  --acc-g:rgba(90,130,255,0.28);
  --grn:#34d885;
  --grn-d:rgba(52,216,133,0.13);
  --amb:#f5a623;
  --amb-d:rgba(245,166,35,0.13);
  --red:#ff6b7a;
  --red-d:rgba(255,107,122,0.13);
  --pur:#c084fc;
  --pur-d:rgba(192,132,252,0.13);
  --txt:#dde4f5;
  --txt2:#8896b8;
  --txt3:#4a5572;
  --fnt:'Plus Jakarta Sans',sans-serif;
  --mono:'JetBrains Mono',monospace;
  --r:10px;--r2:14px;--r3:18px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--fnt);background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden}

/* grid bg */
body::before{
  content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(90,130,255,0.035) 1px,transparent 1px),linear-gradient(90deg,rgba(90,130,255,0.035) 1px,transparent 1px);
  background-size:44px 44px;pointer-events:none;z-index:0;
}
/* glow orb */
body::after{
  content:'';position:fixed;top:-200px;right:-100px;
  width:600px;height:600px;border-radius:50%;
  background:radial-gradient(circle,rgba(90,130,255,0.06) 0%,transparent 70%);
  pointer-events:none;z-index:0;
}

.app{display:flex;min-height:100vh;position:relative;z-index:1}

/* ═══ SIDEBAR ═══ */
.sidebar{
  width:272px;flex-shrink:0;
  background:var(--s1);
  border-right:1px solid var(--b1);
  display:flex;flex-direction:column;
  position:fixed;top:0;left:0;bottom:0;
  overflow-y:auto;z-index:100;
  transition:transform .3s cubic-bezier(.4,0,.2,1);
}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-track{background:transparent}
.sidebar::-webkit-scrollbar-thumb{background:var(--s4);border-radius:99px}

.logo-area{padding:22px 20px 18px;border-bottom:1px solid var(--b1)}
.logo{display:flex;align-items:center;gap:11px}
.logo-mark{
  width:36px;height:36px;border-radius:10px;
  background:linear-gradient(135deg,var(--acc) 0%,#8b5cf6 100%);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;
  box-shadow:0 0 20px rgba(90,130,255,0.35);
}
.logo-name{font-size:15px;font-weight:700;letter-spacing:-.3px;line-height:1.2}
.logo-sub{font-size:10px;color:var(--txt3);font-family:var(--mono);margin-top:2px;letter-spacing:.5px}

.nav-section{padding:18px 14px 6px}
.nav-label{font-size:10px;font-weight:700;letter-spacing:1.4px;color:var(--txt3);text-transform:uppercase;padding:0 6px;margin-bottom:6px;font-family:var(--mono)}
.nav-item{
  display:flex;align-items:center;gap:9px;
  padding:8px 10px;border-radius:9px;
  font-size:13px;color:var(--txt2);
  cursor:pointer;transition:all .15s;
  border:1px solid transparent;margin-bottom:1px;
  user-select:none;
}
.nav-item:hover{background:var(--s3);color:var(--txt);border-color:var(--b1)}
.nav-item.active{background:var(--acc-d);color:var(--acc2);border-color:var(--b2);font-weight:500}
.nav-item .ni-icon{font-size:14px;width:18px;text-align:center;flex-shrink:0}
.nav-item .ni-count{margin-left:auto;font-size:10px;font-family:var(--mono);color:var(--txt3);background:var(--s4);border-radius:99px;padding:1px 7px}
.nav-item.active .ni-count{color:var(--acc);background:var(--acc-d)}

.sidebar-footer{margin-top:auto;padding:16px 20px;border-top:1px solid var(--b1)}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.stat-box{background:var(--s2);border:1px solid var(--b1);border-radius:var(--r);padding:10px 12px;text-align:center}
.stat-val{font-size:18px;font-weight:700;color:var(--acc);font-family:var(--mono);line-height:1}
.stat-key{font-size:10px;color:var(--txt3);margin-top:3px}

/* ═══ MAIN ═══ */
.main{margin-left:272px;flex:1;display:flex;flex-direction:column;min-height:100vh}

/* ═══ TOPBAR ═══ */
.topbar{
  height:62px;display:flex;align-items:center;gap:14px;
  padding:0 28px;
  background:rgba(14,17,24,0.85);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--b1);
  position:sticky;top:0;z-index:50;
}
.menu-btn{display:none;background:none;border:none;color:var(--txt2);font-size:22px;cursor:pointer;padding:4px;line-height:1}
.topbar-title{font-size:15px;font-weight:600;color:var(--txt)}
.topbar-sub{font-size:12px;color:var(--txt3);margin-left:4px}

/* search */
.search-wrap{flex:1;display:flex;align-items:center;gap:10px;max-width:560px;margin-left:auto}
.search-field{
  flex:1;display:flex;align-items:center;gap:9px;
  background:var(--s2);border:1px solid var(--b2);
  border-radius:var(--r);padding:0 13px;
  transition:border-color .2s,box-shadow .2s;
}
.search-field:focus-within{border-color:var(--acc);box-shadow:0 0 0 3px var(--acc-g)}
.search-ico{color:var(--txt3);font-size:13px;flex-shrink:0}
.search-inp{
  flex:1;background:none;border:none;outline:none;
  color:var(--txt);font-family:var(--fnt);font-size:13px;padding:10px 0;
}
.search-inp::placeholder{color:var(--txt3)}
.search-kbd{font-family:var(--mono);font-size:10px;color:var(--txt3);background:var(--s3);border:1px solid var(--b2);border-radius:4px;padding:2px 6px}
.gen-btn{
  display:flex;align-items:center;gap:7px;
  background:var(--acc);color:#fff;
  font-family:var(--fnt);font-size:13px;font-weight:600;
  padding:10px 18px;border-radius:var(--r);
  border:none;cursor:pointer;flex-shrink:0;
  transition:background .15s,transform .1s,opacity .15s;
  box-shadow:0 0 20px var(--acc-g);
}
.gen-btn:hover{background:#4a72ef}
.gen-btn:active{transform:scale(.98)}
.gen-btn:disabled{opacity:.45;cursor:not-allowed;box-shadow:none}

/* ═══ CONTENT ═══ */
.content{flex:1;padding:28px 28px 60px}

/* ═══ VIEW HEADERS ═══ */
.view-hdr{margin-bottom:22px}
.view-hdr h1{font-size:22px;font-weight:700;letter-spacing:-.4px;margin-bottom:4px}
.view-hdr p{font-size:13px;color:var(--txt2);line-height:1.6}

/* ═══ TOPIC CARDS GRID (home) ═══ */
.topics-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;margin-bottom:32px}
.topic-card{
  background:var(--s1);border:1px solid var(--b1);border-radius:var(--r2);
  padding:18px 20px;cursor:pointer;
  transition:all .2s cubic-bezier(.4,0,.2,1);
  position:relative;overflow:hidden;
}
.topic-card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,var(--acc-d),transparent);
  opacity:0;transition:opacity .2s;
}
.topic-card:hover{border-color:var(--b3);transform:translateY(-2px);box-shadow:0 8px 32px rgba(90,130,255,.12)}
.topic-card:hover::before{opacity:1}
.tc-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;position:relative}
.tc-icon{
  width:40px;height:40px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0;
}
.tc-count{font-size:11px;font-family:var(--mono);color:var(--txt3);margin-top:4px}
.tc-name{font-size:14px;font-weight:600;margin-bottom:3px;position:relative}
.tc-desc{font-size:11.5px;color:var(--txt2);line-height:1.5;position:relative}
.tc-arrow{color:var(--txt3);font-size:16px;position:relative;transition:transform .2s}
.topic-card:hover .tc-arrow{transform:translateX(3px);color:var(--acc2)}

/* ═══ QUIZ VIEW ═══ */
.quiz-header{
  display:flex;align-items:center;gap:14px;
  padding:16px 20px;
  background:var(--s1);border:1px solid var(--b1);border-radius:var(--r2);
  margin-bottom:20px;
}
.quiz-topic-icon{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.quiz-topic-name{font-size:16px;font-weight:700;margin-bottom:2px}
.quiz-topic-meta{font-size:12px;color:var(--txt2)}
.quiz-actions{display:flex;gap:8px;margin-left:auto;flex-wrap:wrap}
.btn-sm{
  padding:7px 14px;border-radius:8px;font-size:12px;font-weight:500;
  border:1px solid var(--b2);background:var(--s2);color:var(--txt2);
  cursor:pointer;transition:all .15s;font-family:var(--fnt);
}
.btn-sm:hover{background:var(--s3);color:var(--txt);border-color:var(--b3)}
.btn-sm.primary{background:var(--acc);border-color:var(--acc);color:#fff}
.btn-sm.primary:hover{background:#4a72ef}

/* progress */
.progress-area{margin-bottom:16px}
.progress-bar-wrap{height:5px;background:var(--s3);border-radius:99px;overflow:hidden;margin-bottom:8px}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--acc),var(--pur));border-radius:99px;transition:width .4s ease}
.progress-stats{display:flex;justify-content:space-between;font-size:11px;color:var(--txt3);font-family:var(--mono)}

/* mode tabs */
.mode-tabs{display:flex;gap:6px;margin-bottom:20px}
.mode-tab{
  padding:7px 14px;border-radius:8px;font-size:12px;font-weight:500;
  border:1px solid var(--b1);background:var(--s2);color:var(--txt3);
  cursor:pointer;transition:all .15s;
}
.mode-tab:hover{color:var(--txt2);border-color:var(--b2)}
.mode-tab.on{background:var(--acc-d);border-color:var(--b2);color:var(--acc2)}

/* question card */
.q-wrap{animation:slideUp .25s ease both}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-card{
  background:var(--s1);border:1px solid var(--b1);border-radius:var(--r2);
  overflow:hidden;margin-bottom:14px;
}
.q-card-top{padding:20px 22px 16px}
.q-num-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.q-num{font-size:11px;font-family:var(--mono);color:var(--txt3);background:var(--s3);border-radius:99px;padding:3px 10px}
.q-source-badge{font-size:10px;color:var(--txt3);background:var(--s3);border-radius:99px;padding:3px 8px}
.q-text{font-size:15px;font-weight:500;line-height:1.65;color:var(--txt)}

/* options */
.options-grid{display:flex;flex-direction:column;gap:8px;margin-top:16px}
.opt-btn{
  display:flex;align-items:flex-start;gap:12px;
  padding:12px 15px;border-radius:var(--r);
  border:1px solid var(--b2);background:var(--s2);
  cursor:pointer;text-align:left;font-family:var(--fnt);
  transition:all .15s;color:var(--txt2);font-size:13px;line-height:1.5;
}
.opt-btn:hover:not(:disabled){border-color:var(--acc);background:var(--acc-d);color:var(--txt)}
.opt-btn:disabled{cursor:not-allowed}
.opt-btn.correct{background:var(--grn-d);border-color:rgba(52,216,133,.35);color:var(--grn)}
.opt-btn.wrong{background:var(--red-d);border-color:rgba(255,107,122,.35);color:var(--red)}
.opt-btn.reveal{background:var(--grn-d);border-color:rgba(52,216,133,.35);color:var(--grn)}
.opt-ltr{font-family:var(--mono);font-size:11px;font-weight:600;width:22px;height:22px;border-radius:6px;background:var(--s4);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:background .15s}
.opt-btn.correct .opt-ltr{background:rgba(52,216,133,.2)}
.opt-btn.wrong .opt-ltr{background:rgba(255,107,122,.2)}
.opt-btn.reveal .opt-ltr{background:rgba(52,216,133,.2)}

/* explanation */
.explanation{
  padding:13px 15px;border-radius:var(--r);
  margin-top:12px;font-size:13px;line-height:1.7;
}
.explanation.ok{background:var(--grn-d);border:1px solid rgba(52,216,133,.2);color:var(--txt)}
.explanation.no{background:var(--amb-d);border:1px solid rgba(245,166,35,.2);color:var(--txt)}
.explanation .ex-label{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;font-family:var(--mono);margin-bottom:5px}
.explanation.ok .ex-label{color:var(--grn)}
.explanation.no .ex-label{color:var(--amb)}

/* q nav */
.q-nav{display:flex;gap:10px;justify-content:space-between;align-items:center;padding:14px 22px;border-top:1px solid var(--b1)}
.q-nav-left{display:flex;gap:8px}

/* score screen */
.score-screen{
  background:var(--s1);border:1px solid var(--b1);border-radius:var(--r2);
  padding:48px 32px;text-align:center;animation:slideUp .3s ease;
}
.score-ring{
  width:110px;height:110px;border-radius:50%;
  margin:0 auto 20px;display:flex;align-items:center;justify-content:center;
  position:relative;
}
.score-ring-bg{
  position:absolute;inset:0;border-radius:50%;
  background:conic-gradient(var(--acc) var(--pct),var(--s3) 0);
  transition:background 1s ease;
}
.score-ring-inner{
  position:relative;width:86px;height:86px;border-radius:50%;
  background:var(--s1);display:flex;align-items:center;justify-content:center;
  flex-direction:column;
}
.score-pct{font-size:24px;font-weight:800;font-family:var(--mono);color:var(--acc)}
.score-label{font-size:9px;color:var(--txt3);font-family:var(--mono);letter-spacing:.5px}
.score-msg{font-size:18px;font-weight:700;margin-bottom:8px}
.score-sub{font-size:13px;color:var(--txt2);margin-bottom:24px}
.score-pills{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:28px}
.score-pill{padding:7px 18px;border-radius:99px;font-size:13px;font-weight:500}
.score-pill.g{background:var(--grn-d);color:var(--grn);border:1px solid rgba(52,216,133,.2)}
.score-pill.r{background:var(--red-d);color:var(--red);border:1px solid rgba(255,107,122,.2)}
.score-pill.n{background:var(--s2);color:var(--txt2);border:1px solid var(--b1)}
.score-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}

/* ═══ RAG PANEL ═══ */
.rag-panel{
  background:var(--s1);border:1px solid var(--b1);border-radius:var(--r2);
  margin-bottom:16px;overflow:hidden;
  animation:slideUp .3s ease both;
}
.rag-panel:nth-child(2){animation-delay:.06s}
.rag-panel:nth-child(3){animation-delay:.12s}
.rag-panel:nth-child(4){animation-delay:.18s}
.rag-panel:nth-child(5){animation-delay:.24s}
.panel-hdr{
  display:flex;align-items:center;gap:12px;
  padding:13px 18px;background:var(--s2);
  border-bottom:1px solid var(--b1);
}
.panel-ico{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.panel-title{font-size:13px;font-weight:600}
.panel-badge{margin-left:auto;font-size:10px;font-family:var(--mono);color:var(--txt3);background:var(--s3);border:1px solid var(--b1);border-radius:99px;padding:3px 9px}
.panel-body{padding:18px}

/* concept */
.concept-box{
  background:var(--s2);border-left:3px solid var(--acc);border-radius:0 var(--r) var(--r) 0;
  padding:13px 16px;font-size:13px;line-height:1.75;color:var(--txt);margin-bottom:14px;
}
.facts-lbl{font-size:10px;font-weight:700;letter-spacing:1.2px;color:var(--txt3);text-transform:uppercase;font-family:var(--mono);margin-bottom:8px}
.fact-row{display:flex;gap:10px;margin-bottom:7px;font-size:13px;line-height:1.6;color:var(--txt2)}
.fact-dot{width:6px;height:6px;border-radius:50%;background:var(--acc);margin-top:7px;flex-shrink:0}

/* alt questions */
.alt-q{border:1px solid var(--b1);border-radius:var(--r);margin-bottom:8px;overflow:hidden}
.alt-q-head{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;cursor:pointer;transition:background .15s}
.alt-q-head:hover{background:var(--s2)}
.alt-q-num{font-family:var(--mono);font-size:10px;color:var(--txt3);padding-top:3px;flex-shrink:0}
.alt-q-meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:5px}
.diff-badge{font-size:10px;font-weight:600;border-radius:99px;padding:2px 8px}
.diff-easy{background:var(--grn-d);color:var(--grn)}
.diff-medium{background:var(--amb-d);color:var(--amb)}
.diff-hard{background:var(--red-d);color:var(--red)}
.type-badge{font-size:10px;color:var(--txt3);background:var(--s3);border:1px solid var(--b1);border-radius:99px;padding:2px 8px}
.alt-q-text{font-size:13px;font-weight:500;color:var(--txt);line-height:1.5}
.alt-expand{margin-left:auto;color:var(--txt3);font-size:11px;transition:transform .2s;flex-shrink:0;padding-top:3px}
.alt-q.open .alt-expand{transform:rotate(180deg)}
.alt-q-body{display:none;padding:0 14px 14px;background:var(--s2)}
.alt-q.open .alt-q-body{display:block}
.alt-answer{background:var(--grn-d);border:1px solid rgba(52,216,133,.18);border-radius:var(--r);padding:11px 13px;margin-top:2px}
.alt-ans-lbl{font-size:10px;font-weight:700;letter-spacing:1px;color:var(--grn);font-family:var(--mono);margin-bottom:4px}
.alt-ans-txt{font-size:13px;font-weight:500;color:var(--txt)}
.alt-ans-exp{font-size:12px;color:var(--txt2);margin-top:4px;line-height:1.6}
.try-btn{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--acc);cursor:pointer;margin-top:9px;font-family:var(--mono);transition:opacity .15s}
.try-btn:hover{opacity:.7}

/* evidence */
.ev-item{padding:12px 0;border-bottom:1px solid var(--b1)}
.ev-item:last-child{border-bottom:none}
.ev-meta{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:7px}
.ev-src{font-size:10px;font-weight:700;font-family:var(--mono);color:var(--acc);background:var(--acc-d);border:1px solid rgba(90,130,255,.2);border-radius:99px;padding:2px 9px}
.ev-sec{font-size:10px;color:var(--txt3);background:var(--s3);border-radius:99px;padding:2px 9px;border:1px solid var(--b1);max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ev-score{margin-left:auto;font-size:10px;font-family:var(--mono);color:var(--txt3)}
.ev-score em{color:var(--amb);font-style:normal}
.ev-quote{font-size:12.5px;color:var(--txt2);line-height:1.7;border-left:2px solid var(--acc-d);padding-left:11px;font-style:italic}

/* related */
.rel-wrap{display:flex;flex-wrap:wrap;gap:8px}
.rel-chip{
  padding:7px 14px;background:var(--s2);border:1px solid var(--b1);
  border-radius:8px;font-size:12px;color:var(--txt2);cursor:pointer;transition:all .15s;
}
.rel-chip:hover{background:var(--acc-d);border-color:var(--b2);color:var(--acc2)}

/* JSON */
.json-toggle{
  display:inline-flex;align-items:center;gap:6px;
  font-size:11px;color:var(--txt3);cursor:pointer;font-family:var(--mono);
  padding:5px 10px;border-radius:6px;border:1px solid var(--b1);background:var(--s2);
  transition:all .15s;margin-top:6px;
}
.json-toggle:hover{color:var(--acc);border-color:var(--b2)}
.json-box{
  display:none;margin-top:10px;
  background:#0a0d14;border:1px solid var(--b1);
  border-radius:var(--r);padding:16px;
  font-family:var(--mono);font-size:11px;line-height:1.7;
  color:#6b7fa8;overflow-x:auto;white-space:pre;
  max-height:280px;overflow-y:auto;
}
.json-box.open{display:block}

/* loading */
.loading-wrap{padding:16px 0}
.ls{
  display:flex;align-items:center;gap:14px;
  padding:14px 18px;background:var(--s1);border:1px solid var(--b1);
  border-radius:var(--r);margin-bottom:8px;
  animation:breathe 1.4s ease-in-out infinite;
}

rstands the procedure, its risks, benefits, and alternatives, and voluntarily agrees — respecting patient autonomy."}, {"q": "Anything that interferes with the communication process is referred to as:", "opts": ["Feedback", "Semantic", "Barrier", "Context"], "ans": 2, "exp": "A communication barrier (or 'noise') is anything that interferes with transmission or reception of a message — physical, psychological, semantic, or cultural."}, {"q": "Which is NOT a reason for nutritional status assessment:", "opts": ["Identify population/individuals at risk of malnutrition", "Develop health care programs", "Management of malaria", "Identify those already malnourished"], "ans": 2, "exp": "Malaria management is not a purpose of nutritional assessment. Assessment identifies malnutrition risk, guides programmes, and evaluates interventions."}, {"q": "The action during the EVALUATION phase of the nursing process is:", "opts": ["Have a patient provide input on quality of care received", "Remove surgical staples on scheduled postoperative day", "Provide information on follow-up appointment", "Document patient improved air entry with incentive spirometry"], "ans": 3, "exp": "Evaluation involves assessing whether goals/outcomes were achieved. Documenting improved air entry measures effectiveness of the intervention."}, {"q": "A nurse manager motivates the theatre team with a lunch after saving a patient. Which management theory is applied?", "opts": ["Theory X and Y", "Scientific theory of management", "System management theory", "Human relations theory"], "ans": 3, "exp": "Human relations theory (Mayo): motivation through social rewards, recognition, and group cohesion. Rewards like a team lunch reflect this approach."}], "Paediatric Nursing": [{"q": "The priority nursing diagnosis for a 4-year-old child presenting with diarrhoea:", "opts": ["Altered consciousness", "Fluid volume deficit and electrolyte imbalance", "Fluid volume excess and electrolyte balance", "Elevated body temperatures"], "ans": 1, "exp": "Diarrhoea causes rapid fluid and electrolyte loss. Fluid volume deficit is the most life-threatening and priority concern in paediatric diarrhoea."}, {"q": "Cyanosis on the lips and tongue in sick children indicates:", "opts": ["Poor perfusion", "Altered gaseous exchange", "Hypothermia", "Inadequate venous return"], "ans": 1, "exp": "Central cyanosis (lips, tongue, mucous membranes) = impaired gas exchange with reduced oxygenation. Sign of respiratory or cardiac compromise."}, {"q": "AVPU as used in assessment of level of consciousness in children stands for:", "opts": ["Alertness, Voice response, Pain response, Unresponsiveness", "Awake, Volatile, Pain reaction, Unconsciousness", "Alert, Voice response, Pupil response, Unconsciousness", "Alertness, Volatile, Pain response, Unresponsiveness"], "ans": 0, "exp": "AVPU paediatric scale: Alert, responds to Voice, responds to Pain, Unresponsive. Used for rapid conscious level assessment in emergencies."}, {"q": "An Apgar score of 3 at 5 minutes indicates:", "opts": ["Normal neonatal adaptation", "Mild neonatal depression", "Moderate neonatal depression", "Severe neonatal depression requiring resuscitation"], "ans": 3, "exp": "Apgar score 0-3 at 5 minutes = severe depression requiring immediate resuscitation. 4-6 = moderate; 7-10 = normal."}, {"q": "A caretaker brings a 5-year-old child with bright red blood flowing bilaterally from nasal opening. Initial action:", "opts": ["Pinch the nostrils over the nasal ridge as child leans forward", "Take child to theatre for surgical toileting", "Pinch the nostrils as the child lies supine", "Take the vitals of the child"], "ans": 0, "exp": "Epistaxis management: pinch soft part of nose for 10-15 minutes with child leaning forward (prevents swallowing blood). Never lean back — risk of aspiration."}, {"q": "A 4-year-old child with asthma admitted with wheezing. Nurse's priority intervention?", "opts": ["Administer the prescribed albuterol inhaler", "Increase the child's oxygen supply", "Perform a complete assessment of lung sounds", "Administer oral corticosteroids"], "ans": 0, "exp": "Albuterol (bronchodilator) is first-line for acute asthma exacerbation in children. Immediate bronchodilation relieves bronchospasm."}, {"q": "A 3-year-old child has fever, rash, cough, runny nose, and red eyes. This best supports:", "opts": ["Measles", "Scarlet fever", "Chickenpox", "Roseola"], "ans": 0, "exp": "Measles: 3 Cs (cough, coryza/runny nose, conjunctivitis) + fever and maculopapular rash spreading from face downward."}, {"q": "A 9-month-old infant diagnosed with gastroenteritis. Most important nursing intervention?", "opts": ["Encourage infant to drink small sips of water", "Monitor for signs of dehydration", "Administer antiemetics as prescribed", "Offer solid foods as tolerated"], "ans": 1, "exp": "Dehydration is the primary risk in infant gastroenteritis. Monitor: dry mouth, reduced urine output, sunken fontanelle, loss of skin turgor."}, {"q": "A nurse caring for a child with severe burn. Primary concern in first 24 hours?", "opts": ["Pain management", "Infection prevention", "Fluid resuscitation", "Wound care"], "ans": 2, "exp": "Fluid resuscitation prevents burn shock and restores circulating volume. Burns cause massive fluid loss through damaged skin — first 24h priority."}, {"q": "In children, paralytic ileus accompanies the following metabolic abnormalities EXCEPT:", "opts": ["Hypokalaemia", "Hypocalcaemia", "Uraemia", "Hypermagnesaemia"], "ans": 3, "exp": "Paralytic ileus is associated with hypokalaemia, hypocalcaemia, and uraemia. Hypermagnesaemia does not typically cause paralytic ileus."}], "Mental Health Nursing": [{"q": "A client who has been sexually abused remains calm and quiet. This is an example of which defence mechanism?", "opts": ["Denial", "Dissociation", "Intellectualisation", "Projection"], "ans": 1, "exp": "Dissociation: psychological disconnection from traumatic event. Person appears emotionally detached despite severe trauma — protective mechanism."}, {"q": "According to Sigmund Freud, the structure of the mind is classified as:", "opts": ["Conscious, ID and super ego", "Ego, pre-conscious and ID", "ID, ego and super ego", "Conscious, pre-conscious and unconscious"], "ans": 2, "exp": "Freud's structural model: ID (primal drives), Ego (reality principle, mediator), Super-ego (moral conscience). His topographic model: conscious/preconscious/unconscious."}, {"q": "The state in which a patient repeats words or phrases spoken to them is referred to as:", "opts": ["Echopraxia", "Echolalia", "Neologism", "Word salad"], "ans": 1, "exp": "Echolalia = repetition of words/phrases spoken by others. Echopraxia = imitation of movements. Neologism = invented words. Word salad = incoherent word mixture."}, {"q": "A client with schizophrenia refuses meals. The most appropriate nursing action is:", "opts": ["Allow client to eat whatever is desired at convenience", "Firmly direct the patient to take meals", "Give appetite stimulants and force the patient to eat", "Be with client during meals and get explanations from the patient"], "ans": 3, "exp": "Therapeutic approach: establish rapport, explore reasons for refusal (food delusions?). Being present and non-coercive is most appropriate."}, {"q": "For voluntary admission in a hospital, the client must fill form MOH _____ in duplicate:", "opts": ["306", "314", "308", "400"], "ans": 2, "exp": "MOH 308 is the form used for voluntary psychiatric admission in Kenya."}, {"q": "Neuroleptic malignant syndrome (NMS) is characterised by:", "opts": ["Tardive dyskinesia", "Hyperthermia with muscle rigidity", "Akathisia", "Dystonia"], "ans": 1, "exp": "NMS triad: hyperthermia + severe muscle rigidity + altered consciousness. Associated with elevated CPK, autonomic instability. Medical emergency."}, {"q": "A patient with bipolar disorder experiencing a manic episode. Priority intervention?", "opts": ["Encourage physical activity to reduce energy", "Reduce environmental stimulation and provide a calm setting", "Allow the patient to socialise freely with other patients", "Increase patient's responsibilities to occupy time"], "ans": 1, "exp": "Manic episodes require a low-stimulation environment to reduce agitation. Increased activity or socialisation worsens mania."}, {"q": "A patient with schizophrenia reports hearing voices. Most appropriate nursing response?", "opts": ["Challenge the patient's belief that the voices are real", "Acknowledge that the patient hears the voices without reinforcing them", "Ignore the reports to avoid reinforcing the hallucination", "Encourage group activities to distract from voices"], "ans": 1, "exp": "Acknowledge the patient's experience (therapeutic alliance) without reinforcing the hallucination's reality. Neither dismissing nor confirming the voices."}, {"q": "Sexual relations between children and relatives is termed as:", "opts": ["Rape", "Incest", "Bigamy", "Interrelations"], "ans": 1, "exp": "Incest = sexual relations between persons who are closely related (family members/relatives). Both illegal and a form of child sexual abuse."}, {"q": "When a patient with history of self-harm expresses suicidal ideation, the nurse's FIRST action?", "opts": ["Inform the family immediately", "Assess the patient's immediate safety and risk level", "Remove all potentially harmful objects from the room", "Refer the patient to a psychiatrist"], "ans": 1, "exp": "Risk assessment is the first priority. Evaluate lethality, plan, intent, and means before other interventions."}], "Community & Public Health": [{"q": "Infections that spread through contaminated drinking water are classified as:", "opts": ["Water-borne", "Water-washed", "Water-based", "Water-related"], "ans": 0, "exp": "Bradley's classification: Water-borne = ingested contaminated water (cholera, typhoid). Water-washed = inadequate quantity for hygiene. Water-based = aquatic host pathogens. Water-related = vector uses water habitat."}, {"q": "The drug of choice for treating all species of schistosome is:", "opts": ["Malathion", "Hydroxychloroquine", "Praziquantel", "Ivermectin"], "ans": 2, "exp": "Praziquantel is effective against all Schistosoma species (mansoni, haematobium, japonicum). Ivermectin is used for onchocerciasis and filariasis."}, {"q": "Management of spread of cholera in the community involves:", "opts": ["Referral of the patient to hospital only", "Creating a temporary isolation centre in the community and rehydrating patients", "Quarantining healthcare workers only", "Admitting patients and administering antibiotics only"], "ans": 1, "exp": "Community cholera management: isolate cases locally, provide ORS/rehydration, ensure safe water, practice strict hygiene. Community management prevents spread."}, {"q": "The following vaccines are live attenuated:", "opts": ["Oral polio, pentavalent", "Pentavalent, BCG", "BCG, measles", "Yellow fever, pentavalent"], "ans": 2, "exp": "Live attenuated vaccines: BCG, measles, OPV, yellow fever, MMR, varicella. Pentavalent (DPT-HepB-Hib) is inactivated/subunit."}, {"q": "Community midwifery encourages:", "opts": ["Home deliveries", "Home-grown solutions to pregnancy and child care", "Safe hospital delivery and postnatal follow-up", "Pregnant mothers to seek alternative care"], "ans": 2, "exp": "Community midwifery promotes skilled attendance at birth, safe hospital delivery where possible, and structured postnatal follow-up — not unsupervised home deliveries."}, {"q": "The declaration of Health for All by year 2000 was made in:", "opts": ["1978", "1987", "1986", "1976"], "ans": 0, "exp": "The Alma Ata Declaration (1978) declared 'Health for All by Year 2000' and established primary health care as the key to achieving universal health. Ottawa Charter = 1986."}, {"q": "Cold chain management:", "opts": ["Starts from the health facility to the community", "Starts from the manufacturer to the recipient", "Is a system that uses CHWs and equipment", "Enables use of vaccines for a long time after reconstitution"], "ans": 1, "exp": "The cold chain is the system of storage and transport that keeps vaccines at correct temperatures from manufacturer through to administration to the recipient."}, {"q": "The causative organism for bacillary dysentery is:", "opts": ["Vibrio", "Salmonella", "Shigella", "Amoeba"], "ans": 2, "exp": "Bacillary dysentery is caused by Shigella species. Vibrio = cholera. Amoeba = amoebic dysentery. Salmonella = typhoid/food poisoning."}, {"q": "Spacing methods of family planning include:", "opts": ["Natural methods, chemical barriers, vasectomy", "Mechanical barriers, tubectomy, chemical barriers", "Tubectomy, vasectomy, natural methods", "Chemical barriers, natural methods, mechanical barriers"], "ans": 3, "exp": "Spacing methods = reversible: natural methods, chemical barriers (spermicides), mechanical barriers (condoms, diaphragm). Vasectomy/tubectomy are permanent limiting methods."}, {"q": "The best method for a couple who have met their desired family size:", "opts": ["Condom", "Sterilisation of one partner", "IUCD", "Sterilisation of both partners"], "ans": 1, "exp": "When family size is complete, sterilisation (tubal ligation or vasectomy) of one partner is the most effective and permanent method. Both partners need not be sterilised."}, {"q": "Short-term methods of family planning include:", "opts": ["IUCD and condoms", "Implant insertion and IUCD", "Oral contraceptive and vasectomy", "Microlut and Microgynon"], "ans": 3, "exp": "Short-term methods require regular action: Microlut (POP) and Microgynon (combined OCP) are taken daily. IUCD and implants are long-acting; vasectomy is permanent."}], "Reproductive Health & Contraception": [{"q": "Which is an advantage of using an IUD for contraception?", "opts": ["It requires daily administration", "It provides long-term, reversible contraception", "It is effective only during menstruation", "It has no side effects"], "ans": 1, "exp": "IUDs are long-acting (3-10 years), reversible (fertility returns promptly after removal), and highly effective (>99%)."}, {"q": "Emergency contraception is most effective when taken within:", "opts": ["12 hours of unprotected intercourse", "72 hours of unprotected intercourse", "1 week of unprotected intercourse", "Any time before next period"], "ans": 1, "exp": "Emergency contraception (levonorgestrel) is most effective within 72 hours (3 days), but can be taken up to 120 hours (5 days) after unprotected sex."}, {"q": "Hallmark symptom of menopause:", "opts": ["Increased fertility", "Hot flashes", "Severe depression", "Vaginal bleeding"], "ans": 1, "exp": "Hot flashes (vasomotor symptoms) are the hallmark of menopause, caused by declining estrogen and hypothalamic thermoregulatory dysfunction."}, {"q": "A key consideration for sterilisation as contraception:", "opts": ["It is a reversible procedure", "It is only effective for women under 30", "It is a permanent form of contraception", "It provides protection against STIs"], "ans": 2, "exp": "Sterilisation is considered permanent. It does not protect against STIs, and is not recommended if future fertility may be desired."}, {"q": "Which factor increases a woman's risk for breast cancer?", "opts": ["Family history of breast cancer", "Being physically active", "Breastfeeding", "A low-fat diet"], "ans": 0, "exp": "First-degree family history of breast cancer is a major risk factor. Physical activity, breastfeeding, and low-fat diet are protective."}, {"q": "A woman with difficulty conceiving due to irregular ovulation. Most likely helpful treatment:", "opts": ["Antidepressants", "Clomiphene citrate", "Oral contraceptives", "Sterilisation"], "ans": 1, "exp": "Clomiphene citrate is a selective oestrogen receptor modulator that stimulates ovulation. Most commonly used fertility drug."}, {"q": "Safest contraceptive for immediate postpartum period:", "opts": ["Copper IUD", "Combined oral contraceptives", "Progestin-only pill", "Male condom"], "ans": 2, "exp": "Progestin-only pill is safe postpartum: does not affect milk production and has lower clot risk than combined OCP."}, {"q": "A woman with migraines with aura should avoid which contraceptive?", "opts": ["Progestin-only pill", "Combined oral contraceptives", "Male condoms", "Copper IUD"], "ans": 1, "exp": "Combined OCPs are contraindicated in migraines with aura due to significantly increased risk of ischaemic stroke."}, {"q": "Which contraceptive method provides protection against STIs?", "opts": ["Male condom", "Oral contraceptive pills", "Contraceptive implants", "Copper IUD"], "ans": 0, "exp": "Only barrier methods (condoms) protect against STIs. Hormonal methods and IUDs provide no STI protection."}, {"q": "Most effective STI prevention teaching for teenagers:", "opts": ["Using condoms consistently and correctly", "Choosing partners based on sexual history", "Avoiding sexual activity altogether", "Taking antibiotics before sexual activity"], "ans": 0, "exp": "Consistent, correct condom use provides the most effective barrier against STI transmission, including HIV."}], "HIV & STIs": [{"q": "Primary purpose of PrEP (pre-exposure prophylaxis) for HIV:", "opts": ["To treat acute HIV infection", "To prevent HIV transmission during sexual contact", "To prevent transmission through blood transfusion", "To reduce viral load in HIV-positive individuals"], "ans": 1, "exp": "PrEP (tenofovir/emtricitabine) is taken by HIV-negative individuals at high risk of exposure to reduce acquisition risk by >90%."}, {"q": "Primary method of HIV transmission in sub-Saharan Africa:", "opts": ["Blood transfusions", "Vertical transmission (mother-to-child)", "Intravenous drug use", "Unprotected heterosexual intercourse"], "ans": 3, "exp": "Unprotected heterosexual intercourse accounts for the majority of HIV transmission in sub-Saharan Africa."}, {"q": "Most effective strategy to prevent HIV transmission during labour and delivery in HIV-positive woman:", "opts": ["Elective caesarean delivery", "Intravenous zidovudine during labour", "High-dose ART before delivery", "Prophylactic antibiotic treatment"], "ans": 1, "exp": "IV zidovudine during labour reduces perinatal HIV transmission. Most effective combined with maternal ART."}, {"q": "Recommended prophylactic treatment for PCP (Pneumocystis pneumonia) in HIV patients:", "opts": ["Trimethoprim-sulfamethoxazole (TMP-SMX)", "Isoniazid", "Fluconazole", "Azithromycin"], "ans": 0, "exp": "TMP-SMX is the gold standard for PCP prophylaxis in HIV patients with CD4 <200 cells/mm³."}, {"q": "Main cause of anaemia in patients with HIV:", "opts": ["HIV infection directly causes bone marrow suppression", "Side effects of antiretroviral therapy", "Co-infection with malaria", "HIV-associated renal failure"], "ans": 0, "exp": "HIV directly suppresses bone marrow, reducing RBC production. ART side effects and co-infections can also contribute."}, {"q": "First-line treatment for gonorrhoea:", "opts": ["Oral doxycycline", "Oral metronidazole", "Intramuscular ceftriaxone and oral azithromycin", "Topical clindamycin"], "ans": 2, "exp": "Dual therapy: IM ceftriaxone + oral azithromycin covers gonorrhoea and possible chlamydia co-infection. Penicillin no longer recommended due to resistance."}, {"q": "A patient with HIV: when should ART be initiated?", "opts": ["When CD4 count drops below 200", "Immediately after HIV diagnosis regardless of CD4 count", "Only when symptomatic AIDS-defining illness occurs", "When viral load exceeds 100,000 copies/mL"], "ans": 1, "exp": "Current WHO guidelines recommend initiating ART immediately for all HIV-positive individuals regardless of CD4 count."}, {"q": "Which STI presents with painless genital ulcers?", "opts": ["Gonorrhoea", "Syphilis (primary)", "Herpes simplex virus", "Chlamydia"], "ans": 1, "exp": "Primary syphilis presents with a painless, indurated chancre (genital ulcer). HSV causes painful ulcers. Gonorrhoea/chlamydia cause discharge."}, {"q": "Confirmed STI prevention method that is also highly effective for HIV:", "opts": ["Abstinence only", "Male circumcision", "Consistent and correct condom use", "Spermicides alone"], "ans": 2, "exp": "Consistent, correct condom use provides barrier protection against HIV and most STIs. Male circumcision reduces risk but is not 100% protective."}, {"q": "HPV vaccine prevents which cancers?", "opts": ["Endometrial and ovarian cancer", "Cervical cancer and genital warts", "Breast and ovarian cancer", "Liver and cervical cancer"], "ans": 1, "exp": "HPV vaccine (types 16, 18, 6, 11) prevents cervical cancer (HPV 16/18 = 70% of cases) and genital warts (HPV 6/11). Given to girls aged 9-14 years."}], "Anatomy & Physiology": [{"q": "The layers of the uterus are:", "opts": ["Perimetrium, pericardium, fourchette", "Broad ligament, round ligament, endocervix", "Endometrium, myometrium, perimetrium", "Round ligament, myometrium, ischiocavernosus"], "ans": 2, "exp": "The uterine wall has 3 layers: Endometrium (inner mucosa), Myometrium (middle muscle), Perimetrium (outer serous/peritoneal)."}, {"q": "The pelvic joints include:", "opts": ["One symphysis pubis, two sacrococcygeal joints, two sacroiliac joints", "One symphysis pubis, one sacrococcygeal joint, one sacroiliac joint", "One symphysis pubis, one sacrococcygeal joint, two sacroiliac joints", "One symphysis pubis, two sacrococcygeal joints, one sacroiliac joint"], "ans": 2, "exp": "The pelvis has: 1 symphysis pubis (anteriorly), 1 sacrococcygeal joint, and 2 sacroiliac joints (posterolaterally). Total = 4 joints."}, {"q": "The cell type responsible for bone maintenance is:", "opts": ["Osteoclast", "Osteoblast", "Chondrocyte", "Osteocyte"], "ans": 3, "exp": "Osteocytes are mature bone cells embedded in bone matrix that maintain bone tissue. Osteoblasts form bone; osteoclasts resorb bone; chondrocytes form cartilage."}, {"q": "The most important factors in fracture healing are:", "opts": ["Adequate phosphorus intake, Immobilisation", "Good alignment, Immobilisation", "Adequate calcium intake, wound closure", "Wound closure, adequate potassium intake"], "ans": 1, "exp": "Good bone alignment and adequate immobilisation are the two most critical factors for fracture healing — they prevent malunion and allow callus formation."}, {"q": "The obstetric conjugate of the pelvis is measured from:", "opts": ["Sacral promontory to upper border of symphysis pubis", "Sacral promontory to lower/inner border of symphysis pubis", "Sacral promontory to posterior of symphysis pubis", "Ischial spines to the symphysis pubis"], "ans": 1, "exp": "Obstetric conjugate: sacral promontory to inner/lower border of symphysis pubis (~11 cm). This is the narrowest AP diameter the fetal head must pass."}, {"q": "Fetal lie refers to:", "opts": ["Longitudinal axis of fetus relative to oblique axis of maternal uterus", "Longitudinal axis of fetus relative to transverse axis of maternal uterus", "Longitudinal axis of fetus relative to the long axis of the maternal uterus", "Longitudinal axis of fetus relative to the long axis of the maternal pelvis"], "ans": 2, "exp": "Fetal lie = relationship of the long axis of the fetus to the long axis of the mother's uterus. Can be longitudinal, transverse, or oblique."}, {"q": "The diameter of the lumen of the aorta is mainly controlled by:", "opts": ["The volume of blood flowing through it", "The vasomotor centre in the brain", "Nerve stimulation", "The weather condition surrounding the individual"], "ans": 1, "exp": "The vasomotor centre in the medulla oblongata regulates arterial tone through sympathetic nerve signals to smooth muscle in vessel walls."}, {"q": "A classical symptom of pleurisy associated with pneumonia is:", "opts": ["Hyperpyrexia", "Pain on breathing (pleuritic chest pain)", "Cyanotic nails", "Tachycardia"], "ans": 1, "exp": "Pleurisy causes sharp, stabbing chest pain that worsens with inspiration and coughing — classic pleuritic chest pain."}, {"q": "The diameter used to assess engagement in cephalic presentation is the:", "opts": ["Biparietal diameter", "Suboccipitobregmatic diameter", "Occipitofrontal diameter", "Submentobregmatic diameter"], "ans": 0, "exp": "Engagement = biparietal diameter (widest transverse diameter of fetal head) passes through the pelvic inlet."}, {"q": "Normal fetal heart rate is:", "opts": ["120–160 bpm", "120–140 bpm", "110–160 bpm", "110–140 bpm"], "ans": 0, "exp": "Normal FHR at term: 120–160 bpm. <110 = bradycardia, >160 = tachycardia."}], "Theatre Nursing": [{"q": "Examples of cutting instruments in theatre are:", "opts": ["Dissecting forceps, scissors", "Dissecting forceps, artery forceps", "Scissors, scalpel", "Abdominal retractor, scalpel"], "ans": 2, "exp": "Scissors and scalpel are cutting instruments. Dissecting forceps = grasping. Artery forceps = haemostatic clamps. Retractors = tissue retraction."}, {"q": "The most dangerous complication during induction of spinal anaesthesia is:", "opts": ["Cardiac arrest", "Hypotension", "Hyperthermia", "Respiratory paralysis"], "ans": 3, "exp": "High spinal block can cause total spinal anaesthesia with respiratory paralysis (ascending block to C3-C5 level). Requires immediate airway management and ventilation."}, {"q": "A nurse preparing a patient for surgery: which action should be performed FIRST?", "opts": ["Verifying patient's identity and surgical site", "Administering preoperative antibiotics", "Preparing the sterile field", "Reviewing the patient's medical history"], "ans": 0, "exp": "Patient identity and surgical site verification is the first WHO surgical safety checklist step, preventing wrong-site surgery."}, {"q": "Advantage of balloon valvuloplasty over valve replacement:", "opts": ["Lower doses of anti-rejection drugs required", "The procedure is not associated with infection risk", "Repaired valves tend to function longer than replaced valves", "The procedure can be performed on an outpatient basis"], "ans": 3, "exp": "Valvuloplasty is less invasive than replacement — can be done percutaneously, with shorter recovery, no need for long-term anticoagulation, and no prosthetic valve infection risk."}, {"q": "The nurse has identified risk for infection in a patient undergoing peritoneal dialysis. What nursing action best addresses this risk?", "opts": ["Add antibiotics to dialysate as ordered", "Maintain aseptic technique when administering dialysate", "Administer prophylactic antibiotics by mouth or IV", "Wash skin around catheter site with soap and water before each exchange"], "ans": 1, "exp": "Aseptic technique during all dialysate exchanges is the cornerstone of peritonitis prevention in peritoneal dialysis patients."}, {"q": "Most appropriate traction for a fractured proximal femur:", "opts": ["Russell's traction", "Cervical head halter", "Dunlop's traction", "Buck's extension"], "ans": 3, "exp": "Buck's extension traction is used for proximal femur fractures (hip) to maintain alignment and relieve muscle spasm pre-operatively."}, {"q": "A clinical manifestation of third spacing in a patient with burns is:", "opts": ["Metabolic alkalosis", "Hypermagnesaemia", "Hypercalcaemia", "Hypovolaemia"], "ans": 3, "exp": "Third spacing = fluid shifts from intravascular to interstitial/intracellular spaces. In burns: massive fluid loss → hypovolaemia and circulatory shock."}, {"q": "Which nursing actions will best promote independence for a client in skeletal traction?", "opts": ["Instruct client to call for analgesic before pain becomes severe", "Encourage leg exercise within limits of traction", "Provide skin care to prevent skin breakdown", "Provide an overhead trapeze for client use"], "ans": 3, "exp": "An overhead trapeze allows the patient to reposition, transfer, and perform upper body exercises independently, promoting self-care and preventing complications."}, {"q": "A patient with mastoiditis after radical mastoidectomy. Nurse should identify what priority post-op assessment?", "opts": ["Assessing for mouth droop and decreased lateral eye gaze", "Assessing for scar tissue and cerumen obstructing auditory canal", "Assessing for increased middle ear pressure", "Assessing for gradual onset of conductive hearing loss and nystagmus"], "ans": 0, "exp": "Radical mastoidectomy risks facial nerve (VII) injury. Mouth droop and decreased lateral eye gaze indicate facial nerve damage — priority post-op neurological assessment."}], "Evidence-Based Practice & Research": [{"q": "A nurse is leading a workshop on professional ethics. Which principle is the foundation of nursing ethics?", "opts": ["Accountability", "Patient confidentiality", "Beneficence", "Autonomy"], "ans": 2, "exp": "Beneficence (doing good) is the foundational principle of nursing ethics — actively promoting patient well-being above all."}, {"q": "Most objective way to assess success of a new patient safety protocol:", "opts": ["Gathering subjective feedback from patients", "Analysing patient safety incident reports before and after implementation", "Asking staff to evaluate based on personal experience", "Reviewing the financial cost of implementing the protocol"], "ans": 1, "exp": "Incident reports provide objective, quantifiable outcome data. Patient/staff feedback is valuable but subjective."}, {"q": "Most important quality for a nurse leader in today's healthcare environment:", "opts": ["Strong clinical expertise", "The ability to make quick decisions", "A focus on collaboration and teamwork", "A preference for maintaining hierarchical authority"], "ans": 2, "exp": "Modern healthcare demands interprofessional collaboration. Collaborative leadership improves patient outcomes and staff satisfaction."}, {"q": "Primary benefit of interprofessional education (IPE):", "opts": ["Improved communication and collaboration among healthcare teams", "Increased reliance on physicians for decision-making", "Enhanced individual competence without teamwork", "Decreased length of hospital stays for patients"], "ans": 0, "exp": "IPE aligns healthcare professionals around shared treatment goals, improving coordination and patient outcomes."}, {"q": "A nurse encounters a conflict with a colleague's actions. Best course of action?", "opts": ["Ignore the conflict and continue care", "Confront the colleague publicly", "Discuss the concern privately with the colleague and seek resolution", "Report the colleague to supervisor without addressing directly"], "ans": 2, "exp": "Private resolution maintains professionalism and gives the colleague opportunity to explain. Public confrontation or ignoring escalates the situation."}, {"q": "Most important concept to include in a session on professionalism in nursing:", "opts": ["The importance of continuing education and staying current", "The ability to work independently without relying on others", "Maintaining a strict hierarchical structure", "Avoiding interaction with patients outside the hospital"], "ans": 0, "exp": "Professionalism in nursing is built on lifelong learning and staying current with evidence-based practice."}, {"q": "Paraphrasing as a communication skill means:", "opts": ["You ask the patient to repeat what you tell them", "You get a language interpreter if needed", "You repeat what the client tells you in your own words", "You provide writing materials for hearing difficulties"], "ans": 2, "exp": "Paraphrasing = restating the client's message in your own words to demonstrate understanding and check accuracy."}, {"q": "The best nursing action for a patient reluctant to comply with anti-hypertensive therapy:", "opts": ["Emphasise seriousness and consequences of non-compliance", "Offer detailed explanation of side effects", "Use motivational interviewing to explore patient's concerns and goals", "Recommend the patient seek a second opinion"], "ans": 2, "exp": "Motivational interviewing is evidence-based for improving adherence. It respects patient autonomy and explores intrinsic motivation."}], "Critical Care Nursing": [{"q": "A nurse caring for a patient with a chest tube following thoracotomy. Which action prevents complications?", "opts": ["Clamp the chest tube when patient is ambulating", "Maintain the chest tube system below the level of the patient's chest", "Strip the chest tube to remove clots", "Change the dressing every 48 hours"], "ans": 1, "exp": "Drainage system must always be below chest level to prevent backflow. Clamping risks tension pneumothorax; stripping is not recommended."}, {"q": "Best indicator that a patient is ready to be extubated from mechanical ventilation:", "opts": ["Spontaneous RR of 10-12 breaths/min", "O2 saturation >90% without supplemental O2", "The ability to cough effectively and clear secretions", "Presence of PEEP of 5 cm H2O"], "ans": 2, "exp": "Ability to clear secretions indicates airway protection — the key criterion for safe extubation."}, {"q": "Post-operative patient has hypotension and oliguria. Nurse's primary concern:", "opts": ["Electrolyte imbalances", "Risk for acute renal failure", "Pain management", "Infection prevention"], "ans": 1, "exp": "Hypotension + oliguria = reduced renal perfusion → risk of acute renal failure. Restore perfusion urgently."}, {"q": "In a trauma patient with suspected spinal injury, priority action:", "opts": ["Apply a cervical collar and stabilise the patient", "Administer pain medication for comfort", "Assess the patient's GCS score", "Prepare the patient for CT scan"], "ans": 0, "exp": "Spinal stabilisation is paramount to prevent further cord injury. All other actions are secondary."}, {"q": "ICU patient intubated and sedated. Most important intervention to prevent complications:", "opts": ["Regularly suction the patient's airway", "Administer sedatives to prevent agitation", "Perform passive range-of-motion exercises daily", "Change patient's position every 2 hours"], "ans": 3, "exp": "Repositioning every 2 hours prevents pressure ulcers, atelectasis, and DVT in immobilised patients."}, {"q": "Most effective DVT prevention for post-operative patients:", "opts": ["Administering anticoagulants as prescribed", "Encouraging early and frequent ambulation", "Applying compression stockings", "Ensuring adequate hydration"], "ans": 1, "exp": "Early ambulation promotes venous return and is the most effective DVT prevention strategy. Movement is the primary preventive measure."}, {"q": "During CPR on an unresponsive patient, the nurse should:", "opts": ["Perform chest compressions as rapidly as possible", "Pause compressions every 4-5 minutes for vital signs", "Pause to allow a breath every 10 compressions", "Perform 100-120 chest compressions per minute"], "ans": 3, "exp": "AHA guidelines: 100-120 compressions per minute with ratio 30:2 (compressions:breaths). High-quality compressions at correct rate are critical for ROSC."}, {"q": "A patient with a deep-thickness burn injury. Highest priority nursing diagnosis:", "opts": ["Activity intolerance", "Ineffective coping", "Acute pain", "Anxiety"], "ans": 2, "exp": "Acute pain is the highest priority in burn care. Severe pain from deep burns requires immediate management to prevent shock and allow wound care."}]};

pair soft "}, {"src": "BScN Paper II", "sec": "General", "txt": "the breast. The nipples should be cared for to avoid complications such as sore Prevention from Infection Infection, especially cross infection, can be minimised by encouraging mothers to handle their own babies. Anybody in contact with the child should be encouraged to wash their hands before handling the baby. Visitors should be controlled, especially in a lying in ward. This helps control infection. Midwives or other attendants with a cold or infections foci, should not work with babies. Babi"}, {"src": "BScN Paper I", "sec": "A GUIDE FOR BACHELOR OF SCIENCE (NURSING) LICENSING EXAMINAT", "txt": "needle into the skin keeping it parallel to the skin at 10-15 degrees angle. Do not massage the area after removing the needle. General Requirements for Giving Injections When giving injections ensure that the following are to be found on the top shelf of the trolley: \u2022 Drugs to be used in a container \u2022 A file \u2022 Sterile water for injection \u2022 Spirit swabs in a bowl \u2022 Disposable sterile syringes and needles in a container \u2022 Receiver for carrying the drug to the bedside \u2022 Paper and pen for relevant"}, {"src": "BScN Paper IV", "sec": "SECTION 1: HISTORICAL BACKGROUND, TRENDS IN AND PRINCIPLES O", "txt": "nd a few encouraging words will go a long way to make your student feel settled. When the basic needs mentioned previously get fulfilled, your learner will want to learn at a higher level and exercise mastery of the skills. At this point, you should find out the relevant learning situations available in the clinical setting. Give the students the necessary support to remain successful and encourage them to look for other learning situations on their own. While nursing, the nurse shares the trium"}, {"src": "BScN Paper II", "sec": "General", "txt": "called the fallopian tubes) \u2022 The ovaries These will now be covered separately. The vagina is a fibro-muscular canal joining
