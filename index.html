      <div class="view-hdr"><h1>Generating Study Content</h1><p>Query: <em>"${q}"</em></p></div>
      <div class="ls" id="ls1"><div class="ls-spinner"></div><div><div class="ls-text">Searching textbook knowledge base</div><div class="ls-sub">TF-IDF retrieval · BScN Paper I, II & IV</div></div></div>
      <div class="ls" id="ls2"><div class="ls-spinner"></div><div><div class="ls-text">Generating alternative questions</div><div class="ls-sub">Claude AI · grounded in textbook evidence</div></div></div>
      <div class="ls" id="ls3"><div class="ls-spinner"></div><div><div class="ls-text">Structuring response</div><div class="ls-sub">Parsing answers, explanations, concepts…</div></div></div>
    </div>`;

  await delay(350);
  const evidence=retrieve(q,5);
  done('ls1');

  let ai;
  try{ai=await callAI(q,evidence.length?evidence:KB.slice(0,3));done('ls2')}
  catch(e){
    ai={
      concept_summary:`"${q}" is a nursing concept. Review the textbook evidence below for grounded information.`,
      key_facts:evidence.length?[evidence[0].txt.substring(0,150)+'…']:['See textbook evidence below'],
      alternative_questions:[
        {q:`Define and explain "${q}" in nursing practice.`,type:'recall',difficulty:'easy',answer:'See textbook evidence above',explanation:'Based on BScN textbook content'},
        {q:`A nurse encounters a patient with "${q}". What is the PRIORITY nursing intervention?`,type:'application',difficulty:'medium',answer:'Assessment and appropriate intervention per protocol',explanation:'Apply textbook principles'},
        {q:`Which of the following statements about "${q}" is CORRECT?\nA. Statement A  B. Statement B  C. Statement C  D. Statement D`,type:'MCQ',difficulty:'medium',answer:'Refer to retrieved textbook evidence',explanation:'Review the evidence panel below'}
      ],
      related_concepts:['Nursing Process','Patient Assessment','Clinical Documentation','Evidence-Based Practice','Health Education']
    };
    done('ls2');
  }
  await delay(300);done('ls3');await delay(250);

  renderRAGResults(q,evidence,ai);
  btn.disabled=false;
  btn.innerHTML='Generate ↗';
}

function done(id){
  const el=document.getElementById(id);
  if(el){el.classList.add('done');const s=el.querySelector('.ls-spinner');if(s)s.outerHTML='<span class="ls-ico">✓</span>'}
}

function renderRAGResults(q,ev,ai){
  const letters=['A','B','C','D'];
  const dc=d=>d==='easy'?'diff-easy':d==='hard'?'diff-hard':'diff-medium';

  const qCards=(ai.alternative_questions||[]).map((aq,i)=>`
    <div class="alt-q" id="aq${i}">
      <div class="alt-q-head" onclick="toggleAQ(${i})">
        <span class="alt-q-num">Q${i+1}</span>
        <div style="flex:1">
          <div class="alt-q-meta">
            <span class="diff-badge ${dc(aq.difficulty)}">${aq.difficulty.toUpperCase()}</span>
            <span class="type-badge">${aq.type}</span>
          </div>
          <div class="alt-q-text">${aq.q}</div>
        </div>
        <span class="alt-expand">▾</span>
      </div>
      <div class="alt-q-body">
        <div class="alt-answer">
          <div class="alt-ans-lbl">Answer</div>
          <div class="alt-ans-txt">${aq.answer}</div>
          ${aq.explanation?`<div class="alt-ans-exp">${aq.explanation}</div>`:''}
        </div>
        <div class="try-btn" onclick="setSearch('${aq.q.replace(/'/g,"\\'").substring(0,70)}')">↗ Generate more on this</div>
      </div>
    </div>`).join('');

  const evCards=ev.map(e=>`
    <div class="ev-item">
      <div class="ev-meta">
        <span class="ev-src">${e.src}</span>
        <span class="ev-sec" title="${e.sec}">${e.sec.substring(0,38)}${e.sec.length>38?'…':''}</span>
        <span class="ev-score"><em>${Math.round(e.score*100)}%</em> match</span>
      </div>
      <div class="ev-quote">${e.txt.substring(0,260)}${e.txt.length>260?'…':''}</div>
    </div>`).join('');

  const relChips=(ai.related_concepts||[]).map(c=>`<div class="rel-chip" onclick="setSearch('${c}')">${c}</div>`).join('');

  const jsonData={query:q,retrieved_sources:ev.length,concept_summary:ai.concept_summary,alternative_questions:(ai.alternative_questions||[]).map(x=>({question:x.q,type:x.type,difficulty:x.difficulty,answer:x.answer})),related_concepts:ai.related_concepts};
  const jsonStr=JSON.stringify(jsonData,null,2).replace(/"(\w+)":/g,'<span style="color:#7fa4ff">"$1":</span>').replace(/: "([^"]+)"/g,': <span style="color:#a8d8a8">"$1"</span>').replace(/: (\d+\.?\d*)/g,': <span style="color:#f5a623">$1</span>');

  document.getElementById('content').innerHTML=`
    <div class="view-hdr">
      <h1>Study Content: <span style="color:var(--acc2)">${q}</span></h1>
      <p>${ev.length} textbook source${ev.length!==1?'s':''} retrieved · ${(ai.alternative_questions||[]).length} questions generated</p>
    </div>

    <div class="rag-panel">
      <div class="panel-hdr"><div class="panel-ico" style="background:var(--acc-d)">🧠</div><span class="panel-title">Concept Understanding</span><span class="panel-badge">Step 1 of 4</span></div>
      <div class="panel-body">
        <div class="concept-box">${ai.concept_summary||'Analysis based on retrieved textbook content.'}</div>
        ${(ai.key_facts||[]).length?`<div class="facts-lbl">Key facts from textbooks</div>${(ai.key_facts||[]).map(f=>`<div class="fact-row"><div class="fact-dot"></div><span>${f}</span></div>`).join('')}`:''}
      </div>
    </div>

    <div class="rag-panel">
      <div class="panel-hdr"><div class="panel-ico" style="background:var(--grn-d)">❓</div><span class="panel-title">Alternative Exam Questions</span><span class="panel-badge">${(ai.alternative_questions||[]).length} generated</span></div>
      <div class="panel-body" style="padding:14px">${qCards}</div>
    </div>

    <div class="rag-panel">
      <div class="panel-hdr"><div class="panel-ico" style="background:var(--amb-d)">📖</div><span class="panel-title">Textbook Evidence</span><span class="panel-badge">${ev.length} source${ev.length!==1?'s':''}</span></div>
      <div class="panel-body">${evCards||'<p style="font-size:13px;color:var(--txt3)">No matching textbook sections found. Try rephrasing.</p>'}</div>
    </div>

    <div class="rag-panel">
      <div class="panel-hdr"><div class="panel-ico" style="background:var(--pur-d)">🔗</div><span class="panel-title">Related Concepts to Revise</span><span class="panel-badge">Step 4 of 4</span></div>
      <div class="panel-body"><div class="rel-wrap">${relChips}</div></div>
    </div>

    <div class="rag-panel">
      <div class="panel-hdr"><div class="panel-ico" style="background:var(--s3)">{}</div><span class="panel-title">API Response (JSON)</span><span class="panel-badge">Developer</span></div>
      <div class="panel-body">
        <div class="json-toggle" onclick="this.nextElementSibling.classList.toggle('open');this.textContent=this.nextElementSibling.classList.contains('open')?'▲ Hide JSON':'▾ View JSON response'">▾ View JSON response</div>
        <div class="json-box">${jsonStr}</div>
      </div>
    </div>`;
}

function toggleAQ(i){document.getElementById('aq'+i).classList.toggle('open')}

// UTILS
// ═══════════════════════════════════════════════════════════
function shuffle(a){return a.sort(()=>Math.random()-.5)}
function delay(ms){return new Promise(r=>setTimeout(r,ms))}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('overlay').classList.toggle('open')}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('overlay').classList.remove('open')}

// keyboard
document.addEventListener('keydown',e=>{
  if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();document.getElementById('searchInp').focus()}
  if(e.key==='Escape'){document.getElementById('searchInp').blur();closeSidebar()}
});
document.getElementById('searchInp').addEventListener('keydown',e=>{if(e.key==='Enter')runRAG()});

buildNav();
showHome();
</script>
